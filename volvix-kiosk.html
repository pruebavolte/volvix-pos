<!doctype html>
<html lang="es" id="root">
<head>
<meta charset="utf-8" />
<!-- R8d FIX-M2: viewport (kiosk: no zoom by design) + iOS PWA + safe-area -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Volvix Kiosko</title>
<style>
  :root{
    --bg:#0b1220; --panel:#101a30; --panel2:#162243;
    --txt:#eaf0ff; --muted:#8aa0c8;
    --accent:#3b82f6; --accent2:#22c55e; --warn:#ef4444;
    --card:#1b2748; --border:#243561;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{display:grid;grid-template-rows:64px 1fr 56px;grid-template-columns:1fr 380px}
  header{grid-column:1 / span 2;display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;background:var(--panel);border-bottom:1px solid var(--border)}
  .brand{font-size:22px;font-weight:700;letter-spacing:.5px}
  .brand small{color:var(--muted);font-weight:400;margin-left:8px}
  .toolbar{display:flex;gap:12px;align-items:center}
  .lang{display:flex;background:var(--panel2);border-radius:8px;overflow:hidden}
  .lang button{background:transparent;color:var(--txt);border:0;padding:8px 14px;font-size:14px;cursor:pointer}
  .lang button.active{background:var(--accent)}
  .scan{display:flex;align-items:center;gap:8px;background:var(--panel2);padding:6px 12px;border-radius:8px}
  .scan input{background:transparent;border:0;color:var(--txt);outline:none;width:160px;font-size:14px}
  main{padding:18px;overflow:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,200px);gap:18px;justify-content:flex-start}
  .card{width:200px;height:250px;background:var(--card);border:1px solid var(--border);border-radius:14px;
    display:flex;flex-direction:column;justify-content:space-between;padding:14px;cursor:pointer;
    transition:transform .12s ease, border-color .12s ease}
  .card:active{transform:scale(.97);border-color:var(--accent)}
  .card .icon{font-size:60px;text-align:center;margin-top:14px}
  .card .name{font-size:18px;font-weight:600;line-height:1.2;min-height:44px}
  .card .price{font-size:22px;color:var(--accent2);font-weight:700}
  aside{grid-row:2;grid-column:2;background:var(--panel);border-left:1px solid var(--border);
    display:flex;flex-direction:column}
  aside h2{margin:16px 18px 8px;font-size:18px}
  .cart{flex:1;overflow:auto;padding:0 14px}
  .citem{display:flex;justify-content:space-between;gap:8px;padding:10px;border-bottom:1px dashed var(--border);font-size:15px}
  .citem .qty{display:flex;gap:6px;align-items:center}
  .qty button{width:32px;height:32px;border-radius:6px;border:0;background:var(--panel2);color:var(--txt);font-size:18px;cursor:pointer}
  .totals{padding:14px 18px;border-top:1px solid var(--border)}
  .totals .row{display:flex;justify-content:space-between;font-size:16px;margin:4px 0}
  .totals .grand{font-size:24px;font-weight:700;color:var(--accent2)}
  .pay{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
  .pay button{height:60px;border-radius:10px;border:0;font-size:16px;font-weight:700;cursor:pointer;color:#fff}
  .pay .card-btn{background:var(--accent)}
  .pay .cash-btn{background:#0ea5a4}
  footer{grid-column:1 / span 2;display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;background:var(--panel);border-top:1px solid var(--border);font-size:13px;color:var(--muted)}
  .modal{position:fixed;inset:0;background:rgba(2,6,23,.85);display:none;align-items:center;justify-content:center;z-index:50}
  .modal.show{display:flex}
  .modal .box{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:28px;width:520px;text-align:center}
  .modal h3{margin:0 0 12px;font-size:24px}
  .modal p{color:var(--muted);font-size:16px;margin:0 0 20px}
  .modal .ok{padding:14px 28px;background:var(--accent2);border:0;border-radius:8px;font-size:18px;color:#fff;font-weight:700;cursor:pointer}

  /* ============ R8d FIX-M1: Mobile breakpoints (kiosk responsive) ============ */
  body { padding-top: env(safe-area-inset-top, 0); padding-bottom: env(safe-area-inset-bottom, 0); }
  @media (max-width: 1024px) {
    body { grid-template-columns: 1fr 320px; }
    .grid { grid-template-columns: repeat(auto-fill, 170px); gap: 14px; }
    .card { width: 170px; height: 220px; }
  }
  @media (max-width: 640px) {
    body { grid-template-rows: 56px 1fr 60px 56px; grid-template-columns: 1fr; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .card { width: 100%; height: 200px; }
    .scan input { width: 110px; }
    .lang button, .scan, button { min-height: 44px; }
    .modal .box { width: 92vw; padding: 18px; }
    input, select, textarea { font-size: 16px; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .card { height: 170px; font-size: 12px; }
  }
  @media (hover: none) and (pointer: coarse) {
    button, .lang button, .ok { min-height: 48px; touch-action: manipulation; -webkit-tap-highlight-color: rgba(255,255,255,0.1); }
  }
  /* ============ END R8d FIX-M1 ============ */

  /* ============ A11Y: Accesibilidad kiosko ============ */
  body.a11y-large, body.a11y-large input, body.a11y-large button,
  body.a11y-large .card .name, body.a11y-large .card .price,
  body.a11y-large .totals .row, body.a11y-large .totals .grand,
  body.a11y-large h2, body.a11y-large h3 { font-size: 1.5em !important; line-height: 1.4 !important; }
  body.a11y-large .card { width: 240px; height: 290px; }
  body.high-contrast { background:#000 !important; color:#fff !important; }
  body.high-contrast header, body.high-contrast aside, body.high-contrast footer,
  body.high-contrast .modal .box { background:#000 !important; color:#fff !important; border-color:#fff !important; }
  body.high-contrast .card, body.high-contrast .totals, body.high-contrast .citem { background:#000 !important; color:#fff !important; border-color:#fff !important; }
  body.high-contrast button, body.high-contrast .lang button.active { background:#fff !important; color:#000 !important; border:2px solid #fff !important; }
  body.high-contrast .card .price { color:#fff !important; }
  body.high-contrast input { background:#000 !important; color:#fff !important; border:2px solid #fff !important; }
  body.high-contrast .qty button { background:#fff !important; color:#000 !important; }
  body.high-contrast .modal { background: rgba(0,0,0,.9) !important; }
  #a11y-btn { background:#0ea5a4; color:#fff; border:0; padding:10px 14px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; }
  #a11y-btn:hover { filter: brightness(1.15); }
  #a11y-panel { position: fixed; top: 70px; right: 16px; background: var(--panel2); border:1px solid var(--border); border-radius:12px; padding:16px; min-width:260px; z-index: 60; display:none; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  #a11y-panel.show { display:block; }
  #a11y-panel h4 { margin:0 0 10px; font-size:15px; color:var(--txt); }
  #a11y-panel .a11y-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--border); font-size:14px; }
  #a11y-panel .a11y-row:last-child { border-bottom:0; }
  #a11y-panel .a11y-toggle { width:46px; height:26px; border-radius:14px; background:#444; position:relative; cursor:pointer; transition:.2s; border:0; }
  #a11y-panel .a11y-toggle.on { background: var(--accent2); }
  #a11y-panel .a11y-toggle::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:.2s; }
  #a11y-panel .a11y-toggle.on::after { left:23px; }
  #help-fab { position: fixed; right: 20px; bottom: 76px; z-index: 55; background:#ef4444; color:#fff; border:0; border-radius:50px; padding:18px 26px; font-size:18px; font-weight:700; cursor:pointer; box-shadow:0 8px 24px rgba(239,68,68,.5); display:flex; align-items:center; gap:10px; }
  #help-fab:hover { transform: translateY(-2px); box-shadow:0 12px 28px rgba(239,68,68,.6); }
  #help-fab:active { transform: scale(.97); }
  body.a11y-large #help-fab { font-size: 22px; padding: 22px 32px; }
  /* ============ END A11Y ============ */
</style>
</head>
<body>
<header>
  <div class="brand">VOLVIX <small data-i18n="kiosk">KIOSKO</small></div>
  <div class="toolbar">
    <div class="scan">
      <span>📷</span><input id="barcode" placeholder="Barcode..." autofocus />
    </div>
    <div class="lang">
      <button class="active" data-lang="es">ES</button>
      <button data-lang="en">EN</button>
    </div>
    <button id="a11y-btn" aria-label="Opciones de accesibilidad" aria-haspopup="dialog">♿ Accesibilidad</button>
    <button id="fs-btn" style="background:var(--panel2);color:var(--txt);border:0;padding:8px 12px;border-radius:8px;cursor:pointer" aria-label="Pantalla completa">⛶</button>
  </div>
</header>

<div id="a11y-panel" role="dialog" aria-label="Opciones de accesibilidad" aria-modal="false">
  <h4>♿ Accesibilidad</h4>
  <div class="a11y-row">
    <span>📖 Texto grande</span>
    <button class="a11y-toggle" id="a11y-large" aria-pressed="false" aria-label="Activar texto grande" role="switch"></button>
  </div>
  <div class="a11y-row">
    <span>🌗 Alto contraste</span>
    <button class="a11y-toggle" id="a11y-contrast" aria-pressed="false" aria-label="Activar alto contraste" role="switch"></button>
  </div>
  <div class="a11y-row">
    <span>🔊 Lector de pantalla</span>
    <button class="a11y-toggle" id="a11y-reader" aria-pressed="false" aria-label="Activar etiquetas para lector de pantalla" role="switch"></button>
  </div>
</div>

<button id="help-fab" aria-label="Pedir ayuda al cajero">🆘 Pedir ayuda</button>

<main id="catalog"><div class="grid" id="grid"></div></main>

<aside>
  <h2 data-i18n="cart">Carrito</h2>
  <div class="cart" id="cart"></div>
  <div class="totals">
    <div class="row"><span data-i18n="subtotal">Subtotal</span><span id="subtotal">$0.00</span></div>
    <div class="row"><span data-i18n="tax">IVA 16%</span><span id="tax">$0.00</span></div>
    <div class="row grand"><span data-i18n="total">Total</span><span id="total">$0.00</span></div>
  </div>
  <div class="pay">
    <button class="card-btn" id="pay-card" data-i18n="pay_card">💳 Tarjeta</button>
    <button class="cash-btn" id="pay-cash" data-i18n="pay_cash">💵 Efectivo</button>
  </div>
</aside>

<footer>
  <span id="status" data-i18n="ready">Listo</span>
  <span id="idle">Idle: 60s</span>
</footer>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="m-title">¡Gracias!</h3>
    <p id="m-msg">Pase a caja para confirmar el pago.</p>
    <button class="ok" id="m-ok" data-i18n="ok">OK</button>
  </div>
</div>

<script>
/* ============== i18n ============== */
const I18N = {
  es: { kiosk:'KIOSKO', cart:'Carrito', subtotal:'Subtotal', tax:'IVA 16%', total:'Total',
        pay_card:'💳 Tarjeta', pay_cash:'💵 Efectivo', ready:'Listo',
        thanks:'¡Gracias!', go_cashier:'Pase a caja para confirmar.', card_paid:'Pago aprobado.',
        empty:'Carrito vacío', ok:'OK' },
  en: { kiosk:'KIOSK', cart:'Cart', subtotal:'Subtotal', tax:'Tax 16%', total:'Total',
        pay_card:'💳 Card', pay_cash:'💵 Cash', ready:'Ready',
        thanks:'Thank you!', go_cashier:'Please go to the cashier.', card_paid:'Payment approved.',
        empty:'Empty cart', ok:'OK' }
};
let LANG = localStorage.getItem('kiosk_lang') || 'es';
function t(k){ return (I18N[LANG] && I18N[LANG][k]) || k; }
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
}

/* ============== Estado ============== */
const TENANT_ID = Number(new URLSearchParams(location.search).get('tenant') || 1);
const KIOSK_ID  = Number(new URLSearchParams(location.search).get('kiosk')  || 1);
const API = location.origin;
let token = null;
let cart = [];           // [{id,name,price,qty,icon}]
let products = [];       // catálogo cacheado
const IDLE_MS = 60_000;
let idleTimer = null;

/* ============== Auth Kiosko ============== */
async function openSession(){
  try{
    const r = await fetch(`${API}/api/kiosk/session`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tenant_id: TENANT_ID, kiosk_id: KIOSK_ID })
    });
    const j = await r.json();
    if (j.ok) { token = j.token; document.getElementById('status').textContent = t('ready'); }
    else { document.getElementById('status').textContent = 'Sesión rechazada: ' + (j.error||'?'); }
  }catch(e){ document.getElementById('status').textContent = 'Offline'; }
}

/* ============== Catálogo ============== */
async function loadCatalog(){
  // B6: usar endpoint público /api/kiosk/products (rate-limited 60/min/IP, sin auth)
  products = [];
  try{
    const r = await fetch(`${API}/api/kiosk/products`);
    if (r.ok){
      const j = await r.json();
      const items = (j && (j.items || j.products)) || [];
      products = items.map(p => ({
        id: p.id, name: p.name, price: Number(p.price||0), icon: p.icon || '📦'
      }));
    }
  }catch(_){}
  renderCatalog();
}
function renderCatalog(){
  const g = document.getElementById('grid'); g.innerHTML = '';
  if (!products || !products.length){
    // R28: empty state cuando kiosko no tiene productos reales
    const empty = document.createElement('div');
    empty.style.cssText = 'grid-column:1/-1;text-align:center;padding:60px 20px;color:#94a3b8;';
    empty.innerHTML = '<div style="font-size:48px;margin-bottom:12px">🛒</div>'
      + '<div style="font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:6px">Catálogo no disponible</div>'
      + '<div style="font-size:13px">El operador del kiosko debe configurar productos en el panel.</div>';
    g.appendChild(empty);
    return;
  }
  for (const p of products){
    const c = document.createElement('div'); c.className='card';
    c.innerHTML = `<div class="icon">${p.icon||'📦'}</div>
                   <div class="name">${p.name}</div>
                   <div class="price">$${p.price.toFixed(2)}</div>`;
    c.onclick = () => addToCart(p);
    g.appendChild(c);
  }
}

/* ============== Carrito ============== */
function addToCart(p){
  resetIdle();
  const ex = cart.find(x => x.id === p.id);
  if (ex) ex.qty++; else cart.push({...p, qty:1});
  renderCart();
}
function renderCart(){
  const c = document.getElementById('cart'); c.innerHTML = '';
  if (cart.length === 0){ c.innerHTML = `<p style="color:var(--muted);padding:14px">${t('empty')}</p>`; }
  for (const it of cart){
    const row = document.createElement('div'); row.className='citem';
    row.innerHTML = `<div>${it.icon||'📦'} ${it.name}<br><small style="color:var(--muted)">$${it.price.toFixed(2)}</small></div>
      <div class="qty"><button data-act="-">−</button><span>${it.qty}</span><button data-act="+">+</button></div>`;
    row.querySelector('[data-act="-"]').onclick = () => { it.qty--; if (it.qty<=0) cart = cart.filter(x => x !== it); renderCart(); };
    row.querySelector('[data-act="+"]').onclick = () => { it.qty++; renderCart(); };
    c.appendChild(row);
  }
  const sub = cart.reduce((a,x)=>a + x.price * x.qty, 0);
  const tax = sub * 0.16;
  document.getElementById('subtotal').textContent = '$' + sub.toFixed(2);
  document.getElementById('tax').textContent      = '$' + tax.toFixed(2);
  document.getElementById('total').textContent    = '$' + (sub + tax).toFixed(2);
}

/* ============== Pago ============== */
async function submitOrder(payment){
  if (cart.length === 0) return;
  const sub = cart.reduce((a,x)=>a + x.price * x.qty, 0);
  const amount = +(sub * 1.16).toFixed(2);
  try{
    const r = await fetch(`${API}/api/kiosk/orders`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({
        items: cart.map(x => ({ product_id:x.id, name:x.name, qty:x.qty, price:x.price })),
        amount, payment
      })
    });
    const j = await r.json();
    if (j.ok){
      showModal(t('thanks'), payment === 'card' ? t('card_paid') : t('go_cashier'));
      cart = []; renderCart();
    } else {
      showModal('Error', j.error || 'fail');
    }
  }catch(e){ showModal('Error', String(e.message||e)); }
}
function showModal(title, msg){
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-msg').textContent = msg;
  document.getElementById('modal').classList.add('show');
}

/* ============== Idle reset ============== */
function resetIdle(){
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => { cart = []; renderCart(); document.getElementById('modal').classList.remove('show'); }, IDLE_MS);
}

/* ============== Barcode (lector como teclado) ============== */
const bc = document.getElementById('barcode');
bc.addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    const code = bc.value.trim(); bc.value = '';
    const p = products.find(x => String(x.id) === code || (x.code && x.code === code));
    if (p) addToCart(p);
  }
});
// Refocus barcode (keyboard wedge readers)
setInterval(() => { if (document.activeElement !== bc) bc.focus(); }, 1500);

/* ============== Fullscreen ============== */
document.getElementById('fs-btn').onclick = () => {
  const el = document.documentElement;
  if (!document.fullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  else document.exitFullscreen();
};

/* ============== Wiring ============== */
document.querySelectorAll('.lang button').forEach(b => b.onclick = () => {
  document.querySelectorAll('.lang button').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); LANG = b.dataset.lang; localStorage.setItem('kiosk_lang', LANG);
  document.documentElement.lang = LANG; applyI18n(); renderCart();
});
document.getElementById('pay-card').onclick = () => submitOrder('card');
document.getElementById('pay-cash').onclick = () => submitOrder('cash');
document.getElementById('m-ok').onclick    = () => document.getElementById('modal').classList.remove('show');
['click','keydown','touchstart'].forEach(ev => document.addEventListener(ev, resetIdle, {passive:true}));

/* ============== A11Y: Accesibilidad ============== */
const A11Y_KEY = 'vlx_kiosk_a11y';
const a11yState = (function(){
  try { return JSON.parse(localStorage.getItem(A11Y_KEY) || '{}'); } catch(_) { return {}; }
})();

function saveA11y(){ try { localStorage.setItem(A11Y_KEY, JSON.stringify(a11yState)); } catch(_){} }

function applyA11y(){
  document.body.classList.toggle('a11y-large', !!a11yState.large);
  document.body.classList.toggle('high-contrast', !!a11yState.contrast);
  // Toggle visual state of switches
  const tLarge = document.getElementById('a11y-large');
  const tContrast = document.getElementById('a11y-contrast');
  const tReader = document.getElementById('a11y-reader');
  if (tLarge){ tLarge.classList.toggle('on', !!a11yState.large); tLarge.setAttribute('aria-pressed', !!a11yState.large); }
  if (tContrast){ tContrast.classList.toggle('on', !!a11yState.contrast); tContrast.setAttribute('aria-pressed', !!a11yState.contrast); }
  if (tReader){ tReader.classList.toggle('on', !!a11yState.reader); tReader.setAttribute('aria-pressed', !!a11yState.reader); }
  // Screen reader: añade ARIA labels y role=button a clickables
  if (a11yState.reader){
    document.querySelectorAll('.card').forEach(el => {
      if (!el.hasAttribute('role')) el.setAttribute('role','button');
      if (!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
      const name = el.querySelector('.name')?.textContent?.trim() || 'producto';
      const price = el.querySelector('.price')?.textContent?.trim() || '';
      el.setAttribute('aria-label', `Agregar al carrito: ${name}, precio ${price}`);
    });
    document.querySelectorAll('.qty button, .pay button, .modal .ok, .lang button').forEach(b => {
      if (!b.hasAttribute('role')) b.setAttribute('role','button');
      if (!b.getAttribute('aria-label')){
        b.setAttribute('aria-label', b.textContent.trim() || 'botón');
      }
    });
    document.getElementById('cart')?.setAttribute('aria-live','polite');
    document.getElementById('total')?.setAttribute('aria-live','polite');
  }
}

document.getElementById('a11y-btn').onclick = () => {
  document.getElementById('a11y-panel').classList.toggle('show');
};
document.getElementById('a11y-large').onclick = () => {
  a11yState.large = !a11yState.large; saveA11y(); applyA11y();
};
document.getElementById('a11y-contrast').onclick = () => {
  a11yState.contrast = !a11yState.contrast; saveA11y(); applyA11y();
};
document.getElementById('a11y-reader').onclick = () => {
  a11yState.reader = !a11yState.reader; saveA11y(); applyA11y();
};
// Cierra panel al click fuera
document.addEventListener('click', (e) => {
  const panel = document.getElementById('a11y-panel');
  const btn = document.getElementById('a11y-btn');
  if (panel.classList.contains('show') && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)){
    panel.classList.remove('show');
  }
});

// Help request → cajero
document.getElementById('help-fab').onclick = async () => {
  const btn = document.getElementById('help-fab');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = '⏳ Llamando al cajero...';
  try {
    const r = await fetch(`${API}/api/kds/orders`, {
      method:'POST',
      headers:{'Content-Type':'application/json', ...(token?{'Authorization':'Bearer '+token}:{})},
      body: JSON.stringify({
        type: 'help_request',
        kiosk_id: KIOSK_ID,
        tenant_id: TENANT_ID,
        message: 'Cliente solicita asistencia en kiosko',
        priority: 'high',
        created_at: new Date().toISOString()
      })
    });
    if (r.ok){
      showModal('🆘 Ayuda solicitada', 'Un cajero vendrá a asistirte en breve. Gracias por tu paciencia.');
    } else {
      showModal('Aviso', 'No pudimos llamar al cajero. Por favor dirígete a la caja.');
    }
  } catch(_){
    showModal('Aviso', 'Sin conexión. Por favor dirígete a la caja.');
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 2000);
  }
};

/* ============== Boot ============== */
(async () => {
  applyI18n(); renderCart(); resetIdle();
  applyA11y();
  await openSession();
  await loadCatalog();
  applyA11y(); // re-apply para cards recién renderizadas
})();
</script>
