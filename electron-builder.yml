appId: com.volvix.pos
productName: Volvix POS
copyright: Copyright (c) 2026 Volvix
directories:
  output: dist-electron
  buildResources: electron
files:
  - electron/**/*
  # 2026-05-11: incluir public/ para que la app funcione 100% offline.
  # Antes el .exe solo cargaba la URL de Vercel — si no había internet o tardaba,
  # se congelaba toda la computadora.
  - public/**/*
  - "!public/api/**"
  - "!public/docs/**"
  - "!public/tutorials/**"
  - "!public/MATRIZ_PRUEBAS_LOCAL_v1_backup.html"
  - "!public/volvix-sandbox.html"
  - "!public/volvix-modals-demo.html"
  - "!**/node_modules/**/{CHANGELOG.md,README.md,readme.md,test,__tests__,tests,*.map}"
asar: true
extraMetadata:
  main: electron/main.js
  name: volvix-pos
# 2026-05-11: auto-updater vía GitHub Releases
# El .exe instalado consulta latest.yml en releases/latest y descarga solo
# el diff binario (no toda la app) usando electron-updater.
publish:
  - provider: github
    owner: pruebavolte
    repo: volvix-pos
    releaseType: release
win:
  target:
    - nsis
  icon: electron/icons/icon.png
  # 2026-05-11: nombre sin espacios para que match con latest.yml del auto-updater
  artifactName: "VolvixPOS-Setup-${version}.${ext}"
  signAndEditExecutable: false
  signtoolOptions:
    sign: null
  # 2026-05-14: la app siempre arranca elevada (admin) para que impresoras térmicas,
  # cajón de dinero y servicios de Windows funcionen sin pedir UAC en cada acción.
  # El UAC sale UNA vez al inicio y luego no molesta al adulto mayor.
  requestedExecutionLevel: requireAdministrator
nsis:
  # 2026-05-14 — INSTALADOR SILENCIOSO PARA ADULTOS MAYORES (60-75 años):
  # oneClick=true elimina el wizard completo. NO sale la pantalla de
  # "¿Para quién instalar?". No sale "Siguiente / Cancelar". Solo el UAC
  # del sistema operativo (que NO podemos saltarnos por seguridad de Windows)
  # y luego la app abre sola al terminar.
  oneClick: true
  perMachine: true                     # instala para todos los usuarios → sin pregunta
  allowElevation: true                 # auto-elevación UAC (un solo "Sí" del usuario)
  runAfterFinish: true                 # abre la app automáticamente al terminar
  deleteAppDataOnUninstall: false      # preserva datos del usuario al actualizar
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Volvix POS
  # 2026-05-11: instalador OFFLINE (no descarga nada de internet durante instalación)
  # differentialPackage activado → genera .blockmap para que electron-updater
  # descargue SOLO el diff binario (no el .exe completo) en próximas updates
  differentialPackage: true
  # 2026-05-14: NSIS custom hook que escribe AppCompatFlags RUNASADMIN
  # en HKLM al instalar. Esto fuerza a Windows a SIEMPRE arrancar Volvix POS
  # como administrador (UAC inicial automático, sin que el usuario configure
  # "Ejecutar como administrador" en propiedades del .exe). Necesario para
  # que el módulo printer-auto-setup pueda gestionar impresoras / Spooler.
  include: build/installer.nsh
mac:
  target:
    - dmg
  icon: electron/icons/icon.icns
  category: public.app-category.business
  artifactName: "Volvix POS ${version}.${ext}"
linux:
  target:
    - AppImage
  icon: electron/icons/icon.png
  category: Office
  artifactName: "Volvix-POS-${version}.${ext}"
