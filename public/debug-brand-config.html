<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug brand config</title></head>
<body>
<pre id="out">Loading...</pre>
<script src="brands.config.js"></script>
<script>
// Try to access the config
const out = document.getElementById('out');
try {
  const result = {
    brands_type: typeof BRANDS,
    brands_keys: typeof BRANDS !== 'undefined' ? Object.keys(BRANDS) : null,
    brand_pareo_keys: typeof BRAND_PAREO !== 'undefined' ? Object.keys(BRAND_PAREO) : null,
    brand_pareo_has_liveDemo: typeof BRAND_PAREO !== 'undefined' ? !!BRAND_PAREO.liveDemo : null,
    brand_pareo_liveDemo: typeof BRAND_PAREO !== 'undefined' && BRAND_PAREO.liveDemo ? {
      type: BRAND_PAREO.liveDemo.type,
      eyebrow: BRAND_PAREO.liveDemo.eyebrow,
      has_data: !!BRAND_PAREO.liveDemo.data,
      data_keys: BRAND_PAREO.liveDemo.data ? Object.keys(BRAND_PAREO.liveDemo.data) : null
    } : null,
    // Cross-check via BRANDS[slug]
    brands_pareo_via_lookup: typeof BRANDS !== 'undefined' && BRANDS.pareo ? Object.keys(BRANDS.pareo) : null,
    brands_pareo_liveDemo: typeof BRANDS !== 'undefined' && BRANDS.pareo ? !!BRANDS.pareo.liveDemo : null
  };
  out.textContent = JSON.stringify(result, null, 2);
  // Expose to window for browser console
  window.__debug = result;
  window.__BRAND_PAREO = typeof BRAND_PAREO !== 'undefined' ? BRAND_PAREO : null;
} catch (e) {
  out.textContent = 'ERROR: ' + e.message + '\n' + e.stack;
}
</script>
</body></html>
