<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conectando con Google… · Volvix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at 30% 20%, #1E3A8A 0%, #0A0A0A 65%);
      color: #fff; display: flex; align-items: center; justify-content: center;
    }
    .box {
      text-align: center; padding: 48px 32px; max-width: 380px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; backdrop-filter: blur(10px);
    }
    .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 14px; color: rgba(255,255,255,0.6); }
    .error-msg { color: #f87171; margin-top: 12px; font-size: 13px; }
    .btn-back {
      display: inline-block; margin-top: 20px; padding: 10px 20px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; color: #fff; text-decoration: none; font-size: 14px;
      cursor: pointer;
    }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Verificando con Google…</h2>
    <p id="subtitle">Un momento, estamos confirmando tu identidad.</p>
    <div id="error-area" style="display:none">
      <p class="error-msg" id="error-msg"></p>
      <a href="/login.html" class="btn-back">Volver al login</a>
    </div>
  </div>

  <script>
  (function () {
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = 'Error al conectar';
      document.getElementById('subtitle').textContent = '';
      const ea = document.getElementById('error-area');
      document.getElementById('error-msg').textContent = msg;
      ea.style.display = 'block';
    }

    // Supabase redirige con fragment: #access_token=...&token_type=bearer&...
    // También puede venir como query param en algunos flows: ?access_token=...
    function getParam(name) {
      // Primero buscar en hash (Supabase default)
      const hash = new URLSearchParams(location.hash.replace(/^#/, ''));
      if (hash.get(name)) return hash.get(name);
      // Luego en query
      const qs = new URLSearchParams(location.search);
      return qs.get(name);
    }

    const accessToken = getParam('access_token');
    const errorParam  = getParam('error') || getParam('error_description');

    if (errorParam) {
      return showError('Google rechazó el acceso: ' + decodeURIComponent(errorParam));
    }

    if (!accessToken) {
      return showError('No se recibió token de autenticación. Intenta de nuevo.');
    }

    document.getElementById('title').textContent = 'Iniciando sesión…';
    document.getElementById('subtitle').textContent = 'Creando tu sesión segura.';

    fetch('/api/auth/oauth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: accessToken }),
    })
      .then(r => r.json())
      .then(data => {
        if (!data.ok || !data.token) {
          return showError(data.error || 'Error al crear sesión. Intenta de nuevo.');
        }
        localStorage.setItem('volvix_token', data.token);
        localStorage.setItem('volvixAuthToken', data.token);

        // Determinar destino por rol
        let dest = data.redirect || '/salvadorex-pos.html';
        try {
          const payload = JSON.parse(atob(data.token.split('.')[1]));
          const role = String(payload.role || '').toLowerCase();
          if (role === 'superadmin' || role === 'platform_owner') dest = '/volvix-launcher.html';
        } catch (e) {}

        // Respetar ?redirect= si viene de auth-gate
        try {
          const r = new URLSearchParams(location.search).get('redirect');
          if (r && r.startsWith('/') && !r.startsWith('//') && !r.includes(':')) {
            dest = decodeURIComponent(r);
          }
        } catch (e) {}

        document.getElementById('title').textContent = '¡Listo! Entrando…';
        setTimeout(() => { location.replace(dest); }, 500);
      })
      .catch(err => showError('Error de red: ' + err.message));
  })();
  </script>
</body>
</html>
