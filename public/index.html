<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volvix — Tu Nuevo Aliado en IA para Negocios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #FFFFFF;
            color: #070612;
        }
        body { overflow-x: hidden; }

        @keyframes blur-in {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        @keyframes split-text {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== NAV ===== */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(7,6,18,0.08);
        }
        .nav__brand {
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; font-size: 18px; letter-spacing: -0.02em;
            color: #070612; text-decoration: none;
        }
        .nav__brand-mark {
            width: 32px; height: 32px; border-radius: 9px;
            background: #070612; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: Georgia, serif; font-style: italic; font-weight: 700;
        }
        .nav__links { display: flex; align-items: center; gap: 8px; }
        .nav__link {
            padding: 9px 16px; border-radius: 9999px;
            font-size: 14px; font-weight: 500;
            color: rgba(7,6,18,0.75); text-decoration: none;
            transition: all 0.2s ease;
        }
        .nav__link:hover { color: #070612; background: rgba(7,6,18,0.06); }
        .nav__link--primary {
            background: #070612; color: #fff;
        }
        .nav__link--primary:hover { background: #1a1830; color: #fff; transform: translateY(-1px); }
        .nav__toggle {
            display: none;
            background: none; border: none; cursor: pointer;
            width: 40px; height: 40px;
            color: #070612;
        }
        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .nav__toggle { display: inline-flex; align-items: center; justify-content: center; }
            .nav__links {
                position: absolute; top: 100%; left: 0; right: 0;
                flex-direction: column; align-items: stretch;
                gap: 4px; padding: 12px;
                background: rgba(255,255,255,0.95);
                backdrop-filter: blur(14px);
                border-bottom: 1px solid rgba(7,6,18,0.08);
                transform: translateY(-12px); opacity: 0; pointer-events: none;
                transition: all 0.25s ease;
            }
            .nav__links.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
            .nav__link { text-align: center; }
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            background-color: #FFFFFF;
            padding-top: 64px;
        }

        .hero__video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero__video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            filter: invert(1) hue-rotate(180deg) brightness(1.15) contrast(0.95);
            mix-blend-mode: multiply;
            transition: opacity 0.5s ease;
        }

        .hero__video.loaded {
            opacity: 0.85;
        }

        .hero__gradient {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(to right, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.55) 45%, rgba(255, 255, 255, 0.15) 100%),
                linear-gradient(to bottom, rgba(255, 255, 255, 0) 70%, rgba(255, 255, 255, 1) 100%);
            z-index: 10;
            pointer-events: none;
        }

        .hero__content {
            position: relative;
            z-index: 20;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        @media (min-width: 1024px) {
            .hero__content {
                padding: 0 48px;
            }
        }

        .hero__inner {
            max-width: 1280px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .hero__group {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .hero__badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 9999px;
            border: 1px solid rgba(7, 6, 18, 0.2);
            backdrop-filter: blur(4px);
            background-color: rgba(7, 6, 18, 0.05);
            width: fit-content;
            animation: blur-in 0.6s ease-out 0s both;
        }

        .hero__badge-icon {
            width: 12px;
            height: 12px;
            color: rgba(7, 6, 18, 0.8);
            flex-shrink: 0;
        }

        .hero__badge-text {
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(7, 6, 18, 0.8);
            white-space: nowrap;
        }

        .hero__heading {
            color: #070612;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 500;
            line-height: 1.2;
            margin: 0;
            animation: blur-in 0.8s ease-out 0.1s both;
        }

        .hero__heading-line {
            display: block;
        }

        .hero__heading-serif {
            font-family: Georgia, serif;
            font-style: italic;
        }

        .word {
            display: inline-block;
            margin-right: 0.25em;
            animation: split-text 0.6s ease-out both;
        }

        .word:nth-child(1) { animation-delay: 0.15s; }
        .word:nth-child(2) { animation-delay: 0.23s; }
        .word:nth-child(3) { animation-delay: 0.31s; }
        .word:nth-child(4) { animation-delay: 0.39s; }
        .word:nth-child(5) { animation-delay: 0.47s; }
        .word:nth-child(6) { animation-delay: 0.55s; }
        .word:nth-child(7) { animation-delay: 0.63s; }
        .word:nth-child(8) { animation-delay: 0.71s; }

        .hero__subtitle {
            color: rgba(7, 6, 18, 0.8);
            font-size: 1.125rem;
            font-weight: 400;
            line-height: 1.6;
            max-width: 560px;
            margin: 0;
            animation: blur-in 0.6s ease-out 0.4s both;
        }

        .hero__buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            animation: blur-in 0.6s ease-out 0.6s both;
        }

        .hero__form {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: center;
            animation: blur-in 0.8s ease-out 0.15s both;
        }

        .hero__input {
            flex: 1 1 480px;
            min-width: 280px;
            padding: 8px 0;
            border: none;
            border-bottom: 2px solid rgba(7, 6, 18, 0.35);
            background: transparent;
            color: #070612;
            font-family: inherit;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.01em;
            outline: none;
            transition: border-color 0.25s ease;
        }
        .hero__input::placeholder {
            color: rgba(7, 6, 18, 0.5);
            font-weight: 500;
            font-family: Georgia, serif;
            font-style: italic;
        }
        .hero__input:focus { border-bottom-color: #070612; }

        .hero__form .btn {
            padding: 18px 36px;
            font-size: 1.15rem;
            font-weight: 600;
        }
        .hero__form .btn-icon { width: 22px; height: 22px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 9999px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #070612;
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(7, 6, 18, 0.25);
        }

        .btn-secondary {
            background-color: rgba(7, 6, 18, 0.08);
            color: #070612;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(7, 6, 18, 0.15);
        }

        .btn-secondary:hover {
            background-color: rgba(7, 6, 18, 0.15);
            border-color: rgba(7, 6, 18, 0.25);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFFFFF 0%, #F5F4F1 100%);
            color: rgba(7, 6, 18, 0.35);
            font-size: 13px;
            text-align: center;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .video-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== ALIANZAS ===== */
        .alianzas {
            padding: 72px 24px 96px;
            background: #FAFAF9;
            border-top: 1px solid rgba(7,6,18,0.06);
            text-align: center;
        }
        .alianzas__kicker {
            font-size: 11px; font-weight: 700; letter-spacing: .18em;
            color: rgba(7,6,18,0.45); text-transform: uppercase;
            margin: 0 0 8px;
        }
        .alianzas__title {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 500; color: #070612;
            margin: 0 0 40px; letter-spacing: -0.02em;
        }
        .alianzas__title em { font-family: Georgia, serif; font-style: italic; font-weight: 500; }
        .alianzas__grid {
            display: flex; flex-wrap: wrap;
            align-items: center; justify-content: center;
            gap: 40px;
            max-width: 1100px; margin: 0 auto;
        }
        .alianza-card {
            display: flex; align-items: center; justify-content: center;
            background: #fff; border: 1px solid rgba(7,6,18,0.08);
            border-radius: 18px;
            padding: 22px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .alianza-card:hover { transform: translateY(-4px); box-shadow: 0 14px 32px rgba(0,0,0,.10); }
        .alianza-card img { height: 80px; width: auto; object-fit: contain; display: block; }
        .alianza-card--main {
            border: 2px solid #fb923c;
            box-shadow: 0 14px 40px rgba(249,115,22,.22), 0 0 0 4px rgba(249,115,22,.08);
            transform: translateY(-14px);
            position: relative;
            padding: 26px 36px;
        }
        .alianza-card--main:hover { transform: translateY(-20px); box-shadow: 0 20px 52px rgba(249,115,22,.32), 0 0 0 6px rgba(249,115,22,.10); }
        .alianza-card--main img { height: 120px; }
        .alianza-card__badge {
            position: absolute; top: -13px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #f97316, #ea580c);
            color: #fff;
            font-size: 10px; font-weight: 700; letter-spacing: .08em;
            text-transform: uppercase;
            padding: 4px 12px; border-radius: 20px;
            white-space: nowrap;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .hero { padding-top: 56px; }
            .hero__content { padding: 0 16px; }
            .hero__inner { gap: 28px; }
            .hero__group { gap: 16px; }
            .hero__form { gap: 14px; }
            .hero__input {
                flex: 1 1 100%;
                font-size: clamp(1.6rem, 8vw, 2.4rem) !important;
                padding: 6px 0;
            }
            .hero__form .btn { width: 100%; justify-content: center; padding: 14px 24px; }
            .hero__subtitle { font-size: 1rem; }
            .btn { padding: 10px 18px; font-size: 0.95rem; }

            .alianzas { padding: 48px 16px 64px; }
            .alianzas__grid { gap: 24px; }
            .alianza-card { padding: 14px 18px; }
            .alianza-card img { height: 60px; }
            .alianza-card--main { transform: translateY(0); padding: 18px 22px; }
            .alianza-card--main:hover { transform: translateY(-4px); }
            .alianza-card--main img { height: 90px; }
        }
        @media (max-width: 480px) {
            .nav__brand { font-size: 16px; }
            .nav__brand-mark { width: 28px; height: 28px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav class="nav">
        <a href="/" class="nav__brand">
            <span class="nav__brand-mark">V</span>
            <span>Volvix</span>
        </a>
        <button class="nav__toggle" aria-label="Menu" onclick="document.getElementById('navLinks').classList.toggle('open')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="nav__links" id="navLinks">
            <a class="nav__link" href="/marketplace.html#descargas">Descargas</a>
            <a class="nav__link" href="/login.html">Iniciar sesión</a>
            <a class="nav__link nav__link--primary" href="/registro.html">Crear cuenta</a>
        </div>
    </nav>

    <div class="hero">
        <!-- Video Background -->
        <div class="hero__video-wrapper">
            <video class="hero__video" autoplay loop muted playsinline disablepictureinpicture></video>
            <div class="video-placeholder" id="videoPlaceholder">
                <div>
                    <p style="margin: 0 0 8px 0; font-weight: 500;">Cargando video...</p>
                    <p style="margin: 0; font-size: 12px; opacity: 0.7;">Este hero usa video HLS en vivo</p>
                </div>
            </div>
        </div>

        <!-- Gradient Overlay -->
        <div class="hero__gradient"></div>

        <!-- Content -->
        <div class="hero__content">
            <div class="hero__inner">
                <!-- Badge + Heading + Subtitle -->
                <div class="hero__group">
                    <!-- Badge -->
                    <div class="hero__badge">
                        <svg class="hero__badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        <span class="hero__badge-text">Tu Nuevo Aliado en IA</span>
                    </div>

                    <!-- Form: giro -->
                    <form class="hero__form" onsubmit="event.preventDefault(); var v=document.getElementById('giroInput').value.trim(); if(!v){return;} window.location.href='./marketplace.html?q='+encodeURIComponent(v);">
                        <input id="giroInput" class="hero__input" type="text" placeholder="¿De qué es tu negocio?" autocomplete="off" autofocus required />
                        <button type="submit" class="btn btn-primary">
                            Buscar
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.querySelector('.hero__video');
        const placeholder = document.getElementById('videoPlaceholder');

        if (video && placeholder) {
            const videoUrl = 'https://stream.mux.com/s8pMcOvMQXc4GD6AX4e1o01xFogFxipmuKltNfSYza0200.m3u8';
            
            // Intentar cargar HLS directamente en navegadores Safari/iOS
            video.src = videoUrl;
            
            // Eventos de carga
            video.addEventListener('loadstart', () => {
                placeholder.classList.remove('hidden');
            });
            
            video.addEventListener('loadeddata', () => {
                video.classList.add('loaded');
                placeholder.classList.add('hidden');
            });
            
            video.addEventListener('play', () => {
                video.classList.add('loaded');
                placeholder.classList.add('hidden');
            });

            // Fallback: Si HLS nativo no funciona, cargar HLS.js
            video.addEventListener('error', loadHLSJS);
            
            // Si no se carga en 3 segundos, intentar HLS.js
            setTimeout(() => {
                if (!video.classList.contains('loaded')) {
                    loadHLSJS();
                }
            }, 3000);
            
            function loadHLSJS() {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
                script.onload = function() {
                    if (window.Hls && window.Hls.isSupported()) {
                        const hls = new window.Hls();
                        hls.loadSource(videoUrl);
                        hls.attachMedia(video);
                        hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
                            video.play().catch(err => console.log('Autoplay error:', err));
                            video.classList.add('loaded');
                            placeholder.classList.add('hidden');
                        });
                    }
                };
                document.head.appendChild(script);
            }
        }
    </script>

    <!-- ALIANZAS -->
    <section class="alianzas" id="alianzas">
        <p class="alianzas__kicker">Tenemos alianzas con</p>
        <h2 class="alianzas__title">Nuestras <em>Alianzas</em></h2>
        <div class="alianzas__grid">
            <div class="alianza-card">
                <img src="/sellos/alianza-caintra.webp" alt="CAINTRA Nuevo Leon" loading="lazy" decoding="async">
            </div>
            <div class="alianza-card alianza-card--main">
                <span class="alianza-card__badge">Alianza Principal</span>
                <img src="/sellos/alianza-hechoennl.png" alt="Hecho en Nuevo Leon Mexico" loading="eager" decoding="async">
            </div>
            <div class="alianza-card">
                <img src="/sellos/alianza-coparmex.jpg" alt="COPARMEX" loading="lazy" decoding="async">
            </div>
        </div>
    </section>
</body>
</html>
