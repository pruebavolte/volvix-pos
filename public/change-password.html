<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Actualizar contrasena | Volvix POS</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --border: #dbe3ef;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --danger: #b91c1c;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #ecfeff, transparent 34%), var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(440px, calc(100vw - 32px));
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .brand {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #22c55e);
      font-weight: 800;
      margin-bottom: 18px;
    }
    h1 { font-size: 24px; line-height: 1.15; margin: 0 0 8px; }
    p { margin: 0 0 22px; color: var(--muted); line-height: 1.45; }
    label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 6px; }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15, 118, 110, .13); }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: var(--primary);
      color: white;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled { opacity: .65; cursor: wait; }
    button:not(:disabled):hover { background: var(--primary-dark); }
    .alert {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    .alert.error { display: block; color: var(--danger); background: #fef2f2; border: 1px solid #fecaca; }
    .alert.ok { display: block; color: var(--ok); background: #f0fdf4; border: 1px solid #bbf7d0; }
    .hint { margin-top: 14px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">V</div>
    <h1>Actualiza tu contrasena</h1>
    <p>Tu cuenta entro con una contrasena temporal. Para continuar, crea una contrasena nueva.</p>

    <form id="changePasswordForm">
      <label for="currentPassword">Contrasena temporal actual</label>
      <input id="currentPassword" type="password" autocomplete="current-password" required minlength="8" />

      <label for="newPassword">Nueva contrasena</label>
      <input id="newPassword" type="password" autocomplete="new-password" required minlength="8" />

      <label for="confirmPassword">Confirmar nueva contrasena</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" required minlength="8" />

      <button id="submitBtn" type="submit">Guardar y entrar</button>
      <div id="alertBox" class="alert" role="alert"></div>
      <div class="hint">Minimo 8 caracteres. No uses la misma contrasena temporal.</div>
    </form>
  </main>

  <script>
    const form = document.getElementById('changePasswordForm');
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');

    function token() {
      try {
        return localStorage.getItem('volvix_token') ||
          localStorage.getItem('volvixAuthToken') || '';
      } catch (_) {
        return '';
      }
    }

    function show(message, type) {
      alertBox.textContent = message;
      alertBox.className = 'alert ' + (type || 'error');
    }

    function updateStoredSession() {
      try {
        ['volvixSession', 'volvix:session'].forEach(function (key) {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          const session = JSON.parse(raw);
          session.must_change_password = false;
          localStorage.setItem(key, JSON.stringify(session));
        });
      } catch (_) {}
    }

    if (!token()) {
      show('No hay sesion activa. Inicia sesion nuevamente.', 'error');
      btn.disabled = true;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const current = document.getElementById('currentPassword').value;
      const next = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (next.length < 8) return show('La nueva contrasena debe tener minimo 8 caracteres.', 'error');
      if (next !== confirm) return show('La confirmacion no coincide.', 'error');
      if (current === next) return show('La nueva contrasena no puede ser igual a la temporal.', 'error');

      btn.disabled = true;
      btn.textContent = 'Guardando...';
      alertBox.className = 'alert';
      alertBox.textContent = '';

      try {
        const response = await fetch('/api/users/me/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token()
          },
          body: JSON.stringify({
            current_password: current,
            new_password: next
          })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok) {
          throw new Error(result.error || result.message || 'No se pudo actualizar la contrasena');
        }
        updateStoredSession();
        show('Contrasena actualizada. Entrando al sistema...', 'ok');
        setTimeout(() => { window.location.href = '/salvadorex-pos.html'; }, 700);
      } catch (error) {
        show(error.message || 'No se pudo actualizar la contrasena', 'error');
        btn.disabled = false;
        btn.textContent = 'Guardar y entrar';
      }
    });
  </script>
</body>
</html>
