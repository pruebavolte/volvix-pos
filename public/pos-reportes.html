<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: var(--font-primary);
  font-size: 14px;
  color: var(--text);
  background: var(--bg-2);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── APP ── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── TOPBAR ── */
.topbar {
  background: var(--navy);
  color: #fff;
  height: 40px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.tb-brand { font-weight: 800; font-size: 15px; color: #fff; letter-spacing: -0.3px; }
.tb-brand span { color: #90caf9; }
.tb-section { font-size: 12px; color: #b3c5ff; padding: 2px 8px; background: rgba(255,255,255,0.1); border-radius: 4px; }
.tb-sep { flex: 1; }
.tb-tenant { font-size: 11.5px; color: #90caf9; }
.tb-btn {
  padding: 4px 11px; border-radius: 4px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08); color: #fff;
  font-family: var(--font-primary); transition: background var(--t-base);
}
.tb-btn:hover { background: rgba(255,255,255,0.15); }
.tb-exit { background: var(--danger); border-color: var(--danger); }
.tb-exit:hover { background: var(--danger-2); }

/* ── TABS ── */
.tabs {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  display: flex;
  overflow-x: auto;
  flex-shrink: 0;
}
.tabs::-webkit-scrollbar { height: 0; }
.tab {
  padding: 8px 18px; font-size: 13px; font-weight: 600;
  color: var(--text-3); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; transition: all var(--t-base);
}
.tab:hover { color: var(--navy); background: #f3f4ff; }
.tab.active { color: var(--navy); border-bottom-color: var(--navy); }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.period-group {
  display: flex;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.period-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-3);
  background: transparent;
  border: none;
  font-family: var(--font-primary);
  transition: all var(--t-fast);
  white-space: nowrap;
}
.period-btn:hover { color: var(--navy); background: #e8eaf6; }
.period-btn.active { background: var(--navy); color: #fff; }

.date-input {
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  font-family: var(--font-primary);
  color: var(--text-2);
  background: var(--surface);
  outline: none;
  cursor: pointer;
}
.date-input:focus { border-color: var(--navy); }

.tb-sep { flex: 1; }

.btn {
  padding: 6px 14px; border-radius: var(--radius-lg); font-size: 12.5px;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-2);
  font-family: var(--font-primary); transition: all var(--t-base);
  display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
}
.btn:hover { border-color: var(--border-2); color: var(--text); }
.btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn.primary:hover { background: var(--navy2); }
.btn.sm { padding: 4px 10px; font-size: 11.5px; }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-2); }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 16px 18px;
  transition: border-color var(--t-fast);
}
.kpi:hover { border-color: var(--border-2); }
.kpi-label { font-size: 10.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
.kpi-value { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
.kpi-value.gold   { color: var(--layer-owner); }
.kpi-value.green  { color: var(--green); }
.kpi-value.blue   { color: var(--layer-support); }
.kpi-value.orange { color: var(--orange); }
.kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
.kpi-up   { color: var(--success); font-weight: 600; }
.kpi-down { color: var(--danger);  font-weight: 600; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: 14px;
}
.card-head {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  background: var(--bg-2);
}
.card-title { font-size: 13.5px; font-weight: 700; }
.card-sub   { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
.card-body  { padding: 18px; }

/* ── CHART CONTAINER ── */
.chart-wrap {
  position: relative;
  height: 260px;
  width: 100%;
}

/* ── GRID 2 columnas ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* ── TABLA DE DATOS ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  padding: 8px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  white-space: nowrap;
}
.data-table td {
  padding: 10px 14px;
  font-size: 12.5px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg-2); }
.data-table td.right { text-align: right; }
.data-table td.mono  { font-family: var(--font-mono); font-size: 11.5px; }

/* ── RANKING BAR ── */
.rank-bar-wrap { height: 6px; background: var(--bg-3); border-radius: 100px; margin-top: 4px; overflow: hidden; }
.rank-bar      { height: 6px; border-radius: 100px; transition: width 0.6s var(--ease-out); }

/* ── PILLS ── */
.pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: var(--radius-full);
  font-size: 11px; font-weight: 600;
}
.pill.green  { background: var(--success-soft); color: var(--success-2); }
.pill.orange { background: var(--warn-soft);    color: var(--warn-2);    }
.pill.red    { background: var(--danger-soft);  color: var(--danger-2);  }
.pill.blue   { background: var(--info-soft);    color: var(--info-2);    }
.pill.gray   { background: var(--bg-3);         color: var(--text-3);    }

/* ── EMPTY ── */
.empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
.empty-icon  { font-size: 48px; opacity: 0.35; margin-bottom: 12px; }
.empty-title { font-size: 14px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
.empty-sub   { font-size: 12.5px; }

/* ── LOADING ── */
.spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--navy);
  border-radius: 50%; animation: vlx-spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 7px;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy); color: #fff;
  padding: 9px 20px; border-radius: var(--radius-full);
  font-size: 13px; font-weight: 500;
  z-index: var(--z-toast); opacity: 0;
  transition: all var(--t-slow); pointer-events: none;
  white-space: nowrap; box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { background: var(--green); }
.toast.err  { background: var(--red);   }
.toast.warn { background: var(--orange); }
</style>
</head>
<body>

<div class="app">

  <!-- ── TOPBAR ── -->
  <div class="topbar">
    <div class="tb-brand">Vol<span>vix</span></div>

<script>
'use strict';

// ── Helpers ──
const esc    = (s) => window.volvix?.utils?.esc(s) ?? String(s ?? '');
const money  = (n) => window.volvix?.utils?.money(n) ?? ('$' + Number(n||0).toFixed(2));
const fmtNum = (n, d=0) => Number(n||0).toLocaleString('es-MX', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtDate = (d) => window.volvix?.utils?.date(d, {day:'2-digit',month:'short'}) ?? new Date(d).toLocaleDateString('es-MX');
const fmtDateFull = (d) => window.volvix?.utils?.datetime(new Date(d)) ?? new Date(d).toLocaleString('es-MX');

// ── Estado ──
let currentTab    = 'ventas';
let currentPeriod = 'semana';
let chartInstance = null;

// ── Init sesión ──
(function initSession() {
  const u = window.VOLVIX_USER;
  if (!u) return;
  const el = document.getElementById('tbTenant');
  if (el) el.textContent = u.tenant_name || u.email || '—';
})();

// ── Rango de fechas por período ──
function getRange() {
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  switch (currentPeriod) {
    case 'hoy':
      return { from: today, to: new Date(today.getTime() + 86399999) };
    case 'semana':
      return { from: new Date(today.getTime() - 6 * 86400000), to: new Date(today.getTime() + 86399999) };
    case 'mes':
      return { from: new Date(now.getFullYear(), now.getMonth(), 1), to: new Date(today.getTime() + 86399999) };
    case 'mes_ant': {
      const f = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const t = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
      return { from: f, to: t };
    }
    case 'anio':
      return { from: new Date(now.getFullYear(), 0, 1), to: new Date(today.getTime() + 86399999) };
    case 'custom': {
      const f = document.getElementById('dateFrom')?.value;
      const t = document.getElementById('dateTo')?.value;
      return {
        from: f ? new Date(f) : new Date(today.getTime() - 6 * 86400000),
        to:   t ? new Date(t + 'T23:59:59') : new Date(today.getTime() + 86399999),
      };
    }
    default:
      return { from: new Date(today.getTime() - 6 * 86400000), to: new Date(today.getTime() + 86399999) };
  }
}

// ── Fetch real desde backend (con fallback a demo) ──
async function fetchVentasReales() {
  const { from, to } = getRange();
  const params = new URLSearchParams({
    from: from.toISOString().slice(0, 10),
    to:   to.toISOString().slice(0, 10),
  });
  // Auth header automático vía volvix-api.raw → session token
  try {
    const data = await window.volvix.api.raw('GET', '/api/reports/sales/daily?' + params.toString());
    const arr  = data?.daily || data?.items || data?.sales || [];
    if (Array.isArray(arr) && arr.length) return arr.map(d => ({
      fecha: new Date(d.date || d.fecha || from),
      total: Number(d.total || d.amount || 0),
      tickets: Number(d.tickets || d.count || 1),
      items: d.items || [],
      metodo: d.metodo || d.payment_method || 'efectivo',
      cajero: d.cajero || d.cashier || '—',
      id: d.id || ('V' + Date.now()),
      _real: true,
    }));
  } catch {}
  return null; // caller usará generateDemoVentas como fallback
}

// 2026-05 audit B-31: bandera que indica si los datos en pantalla son demo
// (el dueño DEBE saber que está viendo simulación, no su negocio real).
let _isDemoData = false;
function showDemoBanner(reason) {
  let el = document.getElementById('vlx-demo-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'vlx-demo-banner';
    el.style.cssText = 'background:#fef3c7;border:1px solid #f59e0b;color:#78350f;padding:10px 14px;border-radius:10px;margin:0 0 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px';
    const main = document.querySelector('main') || document.body;
    main.insertBefore(el, main.firstChild);
  }
  el.innerHTML = '⚠️ <strong>Estás viendo datos de ejemplo.</strong> ' + (reason || 'No pudimos cargar tus ventas reales.') +
    ' <a href="#" onclick="window.location.reload();return false" style="color:#92400e;text-decoration:underline">Reintentar</a>';
  el.style.display = '';
}
function hideDemoBanner() {
  const el = document.getElementById('vlx-demo-banner');
  if (el) el.style.display = 'none';
}

// Ventas cacheadas para esta vista
let _ventasCache = null;
async function getVentas() {
  if (_ventasCache) return _ventasCache;
  const real = await fetchVentasReales();
  if (real && real.length) {
    _ventasCache = real;
    _isDemoData = false;
    hideDemoBanner();
  } else {
    _ventasCache = generateDemoVentas();
    _isDemoData = true;
    showDemoBanner('Tu cuenta aún no tiene ventas registradas o el servicio no está disponible.');
  }
  return _ventasCache;
}
function invalidateVentas() { _ventasCache = null; }

// ── Datos demo (fallback) ──
function generateDemoVentas() {
  const ventas = [];
  const productos = ['Coca-Cola 600ml','Pan dulce','Leche Lala 1L','Arroz 1kg','Frijol negro 1kg','Queso fresco 250g','Agua 1.5L','Sabritas Original'];
  const cajeros   = ['María López','Carlos Ruiz','Ana Torres'];
  const metodos   = ['efectivo','tarjeta','transferencia'];
  const { from }  = getRange();
  const dias      = currentPeriod === 'hoy' ? 1 : currentPeriod === 'semana' ? 7 : currentPeriod === 'mes' ? 30 : currentPeriod === 'anio' ? 365 : 7;

  for (let d = 0; d < dias; d++) {
    const fechaDia = new Date(from.getTime() + d * 86400000);
    const ticketsDia = Math.floor(8 + Math.random() * 20);
    for (let t = 0; t < ticketsDia; t++) {
      const items = [];
      const numItems = Math.floor(1 + Math.random() * 6);
      let total = 0;
      for (let i = 0; i < numItems; i++) {
        const prod = productos[Math.floor(Math.random() * productos.length)];
        const qty  = Math.floor(1 + Math.random() * 4);
        const precio = 8 + Math.random() * 120;
        items.push({ nombre: prod, qty, precio: Math.round(precio * 100) / 100 });
        total += qty * precio;
      }
      ventas.push({
        id:      'V' + String(d * 100 + t).padStart(4,'0'),
        fecha:   new Date(fechaDia.getTime() + Math.random() * 50000000),
        total:   Math.round(total * 100) / 100,
        items,
        metodo:  metodos[Math.floor(Math.random() * metodos.length)],
        cajero:  cajeros[Math.floor(Math.random() * cajeros.length)],
      });
    }
  }
  return ventas;
}

// ── Tabs ──
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  loadCurrentTab();
}

function loadCurrentTab() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const fns = { ventas: renderVentas, productos: renderProductos, clientes: renderClientes, metodos: renderMetodos, cajeros: renderCajeros };
  if (fns[currentTab]) fns[currentTab]();
}

// ── Período ──
function setPeriod(p, el) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const custom = document.getElementById('customDates');
  if (custom) custom.style.display = p === 'custom' ? 'flex' : 'none';
  invalidateVentas();
  if (p !== 'custom') loadCurrentTab();
}

function applyCustomDates() {
  invalidateVentas();
  loadCurrentTab();
}

// ── Exportar PDF (servidor) ──
async function exportarPDF() {
  const { from, to } = getRange();
  const params = new URLSearchParams({
    from: from.toISOString().slice(0, 10),
    to:   to.toISOString().slice(0, 10),
  });
  try {
    const headers = window.volvix?.session?.getAuthHeaders?.() || {};
    // Asegurar Authorization Bearer si tenemos token
    try {
      const tk = localStorage.getItem('volvix_token') || localStorage.getItem('volvixAuthToken');
      if (tk && !headers.Authorization && !headers.authorization) headers.Authorization = 'Bearer ' + tk;
    } catch (_) {}
    const resp = await fetch('/api/reports/sales/pdf?' + params.toString(), { headers });
    if (resp.status === 401) {
      toast('Sesión expirada. Redirigiendo a login…', 'warn');
      setTimeout(() => location.replace('/login.html?redirect=' + encodeURIComponent(location.pathname)), 800);
      return;
    }
    if (resp.status === 503) {
      toast('Reportes no configurados (PDF). Contacta soporte.', 'warn');
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `reporte_ventas_${currentPeriod}_${new Date().toISOString().slice(0,10)}.pdf`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    toast('✓ PDF descargado', 'ok');
  } catch (err) {
    toast('PDF no disponible: ' + err.message, 'warn');
  }
}

// ══════════════════════════════════════════════
// SVG Chart helpers (vanilla, sin CDN) — autocontenido
// ══════════════════════════════════════════════
function vlxEsc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
function vlxTooltipHost(elementId){
  var el = document.getElementById(elementId);
  if (!el) return null;
  var tip = el.querySelector('.vlx-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'vlx-tip';
    tip.style.cssText = 'position:absolute;pointer-events:none;background:#1a237e;color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;line-height:1.3;box-shadow:0 4px 12px rgba(0,0,0,.25);opacity:0;transform:translate(-50%,-110%);transition:opacity .12s;white-space:nowrap;z-index:5';
    el.appendChild(tip);
    el.style.position = el.style.position || 'relative';
  }
  return tip;
}
function vlxRenderBarChart(elementId, data, options){
  var el = document.getElementById(elementId);
  if (!el || !Array.isArray(data) || !data.length) { if (el) el.innerHTML = '<div style="color:#888;padding:20px;font-size:12px">Sin datos</div>'; return; }
  options = options || {};
  var W = options.width || 720, H = options.height || 220, P = 28;
  var max = Math.max.apply(null, data.map(function(d){ return Number(d.value)||0; }).concat([1]));
  var bw = (W - P*2) / data.length * 0.78;
  var gap = (W - P*2) / data.length * 0.22;
  var color = options.color || '#1a237e';
  var bars = data.map(function(d, i){
    var v = Number(d.value)||0;
    var h = (v/max) * (H - P*2);
    var x = P + i*(bw+gap) + gap/2;
    var y = H - P - h;
    return '<rect class="vlx-bar" data-idx="'+i+'" x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="3" fill="'+color+'" style="cursor:pointer;transition:opacity .12s"></rect>'+
      '<text x="'+(x+bw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="10" fill="#666">'+vlxEsc(d.label||'')+'</text>';
  }).join('');
  // Y axis ticks
  var ticks = '';
  for (var i=0;i<=4;i++){
    var ty = P + i*((H-P*2)/4);
    var val = Math.round(max - (max*i/4));
    ticks += '<line x1="'+P+'" y1="'+ty+'" x2="'+(W-P)+'" y2="'+ty+'" stroke="#eee" stroke-width="1"/>'+
             '<text x="4" y="'+(ty+3)+'" font-size="9" fill="#999">'+val+'</text>';
  }
  el.style.position = 'relative';
  el.innerHTML = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100%;display:block">'+ticks+bars+'</svg>';
  var tip = vlxTooltipHost(elementId);
  el.querySelectorAll('.vlx-bar').forEach(function(rect){
    rect.addEventListener('mouseenter', function(ev){
      var d = data[+rect.getAttribute('data-idx')];
      rect.style.opacity = .8;
      if (tip) {
        tip.innerHTML = '<b>'+vlxEsc(d.label||'')+'</b><br>'+(options.fmt ? options.fmt(d.value) : d.value);
        var box = el.getBoundingClientRect();
        tip.style.left = (ev.clientX - box.left) + 'px';
        tip.style.top  = (ev.clientY - box.top) + 'px';
        tip.style.opacity = 1;
      }
    });
    rect.addEventListener('mousemove', function(ev){
      if (!tip) return;
      var box = el.getBoundingClientRect();
      tip.style.left = (ev.clientX - box.left) + 'px';
      tip.style.top  = (ev.clientY - box.top) + 'px';
    });
    rect.addEventListener('mouseleave', function(){ rect.style.opacity = 1; if (tip) tip.style.opacity = 0; });
    if (typeof options.onClick === 'function') {
      rect.addEventListener('click', function(){ options.onClick(data[+rect.getAttribute('data-idx')]); });
    }
  });
}
function vlxRenderPieChart(elementId, data, options){
  var el = document.getElementById(elementId);
  if (!el || !Array.isArray(data) || !data.length) { if (el) el.innerHTML = '<div style="color:#888;padding:20px;font-size:12px">Sin datos</div>'; return; }
  options = options || {};
  var W = options.width || 280, H = options.height || 220, cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 16;
  var total = data.reduce(function(s,d){ return s + (Number(d.value)||0); }, 0) || 1;
  var ang = -Math.PI/2;
  var paths = data.map(function(d, i){
    var v = Number(d.value)||0;
    var slice = (v/total) * Math.PI*2;
    var x1 = cx + r*Math.cos(ang), y1 = cy + r*Math.sin(ang);
    ang += slice;
    var x2 = cx + r*Math.cos(ang), y2 = cy + r*Math.sin(ang);
    var large = slice > Math.PI ? 1 : 0;
    var color = d.color || ['#1a237e','#2e7d32','#c62828','#ef6c00','#6a1b9a','#00838f'][i % 6];
    return '<path class="vlx-slice" data-idx="'+i+'" d="M '+cx+' '+cy+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' Z" fill="'+color+'" stroke="#fff" stroke-width="2" style="cursor:pointer;transition:opacity .12s"></path>';
  }).join('');
  // Legend
  var legend = data.map(function(d,i){
    var color = d.color || ['#1a237e','#2e7d32','#c62828','#ef6c00','#6a1b9a','#00838f'][i % 6];
    var pct = Math.round((Number(d.value)||0)/total*100);
    return '<div style="display:flex;align-items:center;gap:6px;font-size:11.5px;margin:3px 0"><span style="display:inline-block;width:10px;height:10px;background:'+color+';border-radius:2px"></span>'+vlxEsc(d.label||'')+' <span style="color:#888;margin-left:auto">'+pct+'%</span></div>';
  }).join('');
  el.style.position = 'relative';
  el.innerHTML = '<div style="display:flex;align-items:center;gap:14px;height:100%"><svg viewBox="0 0 '+W+' '+H+'" style="flex:0 0 auto;height:100%;max-height:'+H+'px">'+paths+'</svg><div style="flex:1;min-width:0">'+legend+'</div></div>';
  var tip = vlxTooltipHost(elementId);
  el.querySelectorAll('.vlx-slice').forEach(function(p){
    p.addEventListener('mouseenter', function(ev){
      var d = data[+p.getAttribute('data-idx')];
      var pct = Math.round((Number(d.value)||0)/total*100);
      p.style.opacity = .8;
      if (tip) {
        tip.innerHTML = '<b>'+vlxEsc(d.label||'')+'</b><br>'+(options.fmt ? options.fmt(d.value) : d.value)+' ('+pct+'%)';
        var box = el.getBoundingClientRect();
        tip.style.left = (ev.clientX - box.left) + 'px';
        tip.style.top  = (ev.clientY - box.top) + 'px';
        tip.style.opacity = 1;
      }
    });
    p.addEventListener('mousemove', function(ev){
      if (!tip) return;
      var box = el.getBoundingClientRect();
      tip.style.left = (ev.clientX - box.left) + 'px';
      tip.style.top  = (ev.clientY - box.top) + 'px';
    });
    p.addEventListener('mouseleave', function(){ p.style.opacity = 1; if (tip) tip.style.opacity = 0; });
    if (typeof options.onClick === 'function') {
      p.addEventListener('click', function(){ options.onClick(data[+p.getAttribute('data-idx')]); });
    }
  });
}
function vlxRenderLineChart(elementId, data, options){
  var el = document.getElementById(elementId);
  if (!el || !Array.isArray(data) || !data.length) { if (el) el.innerHTML = '<div style="color:#888;padding:20px;font-size:12px">Sin datos</div>'; return; }
  options = options || {};
  var W = options.width || 720, H = options.height || 200, P = 28;
  var max = Math.max.apply(null, data.map(function(d){ return Number(d.value)||0; }).concat([1]));
  var stepX = (W - P*2) / Math.max(data.length-1,1);
  var pts = data.map(function(d, i){
    var v = Number(d.value)||0;
    return [P + i*stepX, H - P - (v/max)*(H-P*2)];
  });
  var color = options.color || '#1a237e';
  var path = 'M ' + pts.map(function(p){ return p.join(','); }).join(' L ');
  var area = path + ' L ' + (W-P) + ',' + (H-P) + ' L ' + P + ',' + (H-P) + ' Z';
  var ticks = '';
  for (var i=0;i<=4;i++){
    var ty = P + i*((H-P*2)/4);
    var val = Math.round(max - (max*i/4));
    ticks += '<line x1="'+P+'" y1="'+ty+'" x2="'+(W-P)+'" y2="'+ty+'" stroke="#eee" stroke-width="1"/>'+
             '<text x="4" y="'+(ty+3)+'" font-size="9" fill="#999">'+val+'</text>';
  }
  var dots = pts.map(function(p, i){
    return '<circle class="vlx-dot" data-idx="'+i+'" cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="'+color+'" stroke="#fff" stroke-width="1.5" style="cursor:pointer"></circle>';
  }).join('');
  // X labels (every Nth to avoid overlap)
  var step = Math.ceil(data.length/8);
  var xLabels = data.map(function(d, i){
    if (i % step !== 0) return '';
    return '<text x="'+pts[i][0]+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#666">'+vlxEsc(d.label||'')+'</text>';
  }).join('');
  el.style.position = 'relative';
  el.innerHTML = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:100%;display:block">'+
    '<defs><linearGradient id="vlxLG_'+elementId+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+
    ticks+
    '<path d="'+area+'" fill="url(#vlxLG_'+elementId+')"/>'+
    '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round"/>'+
    dots+xLabels+
    '</svg>';
  var tip = vlxTooltipHost(elementId);
  el.querySelectorAll('.vlx-dot').forEach(function(c){
    c.addEventListener('mouseenter', function(ev){
      var d = data[+c.getAttribute('data-idx')];
      c.setAttribute('r','5');
      if (tip) {
        tip.innerHTML = '<b>'+vlxEsc(d.label||'')+'</b><br>'+(options.fmt ? options.fmt(d.value) : d.value);
        var box = el.getBoundingClientRect();
        tip.style.left = (ev.clientX - box.left) + 'px';
        tip.style.top  = (ev.clientY - box.top) + 'px';
        tip.style.opacity = 1;
      }
    });
    c.addEventListener('mousemove', function(ev){
      if (!tip) return;
      var box = el.getBoundingClientRect();
      tip.style.left = (ev.clientX - box.left) + 'px';
      tip.style.top  = (ev.clientY - box.top) + 'px';
    });
    c.addEventListener('mouseleave', function(){ c.setAttribute('r','3.5'); if (tip) tip.style.opacity = 0; });
    if (typeof options.onClick === 'function') {
      c.addEventListener('click', function(){ options.onClick(data[+c.getAttribute('data-idx')]); });
    }
  });
}

// 2026-05 audit B-32: helper para calcular delta REAL vs período anterior.
// Antes: '↑ 12.4%' estaba hardcodeado en HTML — mentía al dueño sobre su negocio.
async function _calcDeltaPeriodoAnterior() {
  // Si los datos son demo, devolver null (no inventar deltas)
  if (_isDemoData) return { ventas: null, tickets: null, ticketProm: null, demo: true };
  try {
    const r = getRange();
    const start = new Date(r.from);
    const end = new Date(r.to || Date.now());
    const ms = end - start;
    const prevEnd = new Date(start.getTime() - 1);
    const prevStart = new Date(start.getTime() - ms);
    const headers = { 'Accept':'application/json' };
    const tok = localStorage.getItem('volvix_token');
    if (tok) headers['Authorization'] = 'Bearer ' + tok;
    const url = '/api/reports/sales?from=' + prevStart.toISOString().slice(0,10) + '&to=' + prevEnd.toISOString().slice(0,10);
    const resp = await fetch(url, { headers });
    if (!resp.ok) return { ventas: null, tickets: null, ticketProm: null };
    const j = await resp.json();
    const list = (j && (j.daily || j.items || [])) || [];
    const tot = list.reduce((s, x) => s + Number(x.total || x.amount || 0), 0);
    const cnt = list.reduce((s, x) => s + Number(x.count || x.orders || 0), 0);
    const tp = cnt > 0 ? (tot / cnt) : 0;
    return { ventas: tot, tickets: cnt, ticketProm: tp };
  } catch (e) { return { ventas: null, tickets: null, ticketProm: null }; }
}
function _renderDelta(curr, prev, isCurrency) {
  if (prev == null || prev <= 0) return '<span class="kpi-sub" style="color:#94a3b8">— sin comparativo</span>';
  const diff = curr - prev;
  const pct = (diff / prev) * 100;
  const cls = pct >= 0 ? 'kpi-up' : 'kpi-down';
  const arrow = pct >= 0 ? '↑' : '↓';
  return '<span class="' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span> vs período anterior';
}

        <div class="kpi-label">Ticket promedio</div>
        <div class="kpi-value blue">${money(ticket)}</div>

        <div class="kpi-label">Mayor venta del día</div>
        <div class="kpi-value orange">${money(Math.max(...dias.map(d => d.total)))}</div>

      <div class="card-head">
        <div>
          <div class="card-title">Ventas por día</div>
          <div class="card-sub">${fmtDate(from)} — hoy · click en barra para filtrar tabla</div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-wrap"><canvas id="chartVentas"></canvas></div>
      </div>
    </div>

    <!-- Gráficas SVG inline (vanilla, sin CDN) -->

      <div class="card">
        <div class="card-head">
          <div class="card-title">📊 Ventas por día (SVG)</div>
          <div class="card-sub">Click en una barra para filtrar la tabla</div>
        </div>
        <div class="card-body">
          <div id="vlx-bar-ventas" style="height:240px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title">🥧 Métodos de pago (SVG)</div>
          <div class="card-sub">Distribución del periodo</div>
        </div>

          <div id="vlx-pie-metodos" style="height:240px"></div>

      <div class="card-head">
        <div>
          <div class="card-title">📈 Tendencia 30 días (SVG)</div>
          <div class="card-sub">Hover sobre los puntos para ver el detalle</div>
        </div>

    if (lineData.length < 30) {
      // pad backwards with zeros

    }
    vlxRenderLineChart('vlx-line-trend', lineData.slice(-30), {
      color: '#FBBF24',
      fmt: function(v){ return money(v); },
      onClick: function(d){ if (d && d.label) vlxFilterByDay(d.label); }
    });

}

// Drill-down helpers exposed globally
function vlxFilterByDay(dayLabel){
  var pill = document.getElementById('vlx-filter-pill');
  var dayEl = document.getElementById('vlx-filter-day');
  var tbody = document.getElementById('vlx-ventas-tbody');
  if (!tbody) return;
  if (pill && dayEl) { pill.style.display = 'block'; dayEl.textContent = dayLabel; }
  Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr){
    tr.style.display = (tr.getAttribute('data-fecha') === dayLabel) ? '' : 'none';
  });
}
function vlxClearDayFilter(){
  var pill = document.getElementById('vlx-filter-pill');
  var tbody = document.getElementById('vlx-ventas-tbody');
  if (pill) pill.style.display = 'none';
  if (tbody) Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr){ tr.style.display = ''; });
}
// Drill-down by payment method (clicked from pie chart). Filters the ventas table.
function vlxFilterByMethod(methodLabel){
  var tbody = document.getElementById('vlx-ventas-tbody');
  if (!tbody || !methodLabel) return;
  var pill = document.getElementById('vlx-filter-pill');
  var dayEl = document.getElementById('vlx-filter-day');
  if (pill && dayEl) { pill.style.display = 'block'; dayEl.textContent = 'método: ' + methodLabel; }
  var key = String(methodLabel).toLowerCase();
  Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(tr){
    var m = (tr.getAttribute('data-metodo') || tr.textContent || '').toLowerCase();
    tr.style.display = m.indexOf(key) >= 0 ? '' : 'none';
  });
}
window.vlxFilterByDay = vlxFilterByDay;
window.vlxFilterByMethod = vlxFilterByMethod;
window.vlxClearDayFilter = vlxClearDayFilter;

// 2026-05 audit B-30: CSV ahora exporta DATOS REALES, no solo header vacío.
function _csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function _toCSV(rows, headers) {
  const lines = [headers.map(_csvEscape).join(',')];
  for (const r of rows) {
    lines.push(headers.map(h => _csvEscape(r[h])).join(','));
  }
  return lines.join('\r\n');
}
function exportarReporte() {
  let rows = [];
  let headers = [];
  let nombre = currentTab || 'reporte';
  try {
    if (currentTab === 'ventas' || currentTab === 'ventas-diarias') {
      rows = (Array.isArray(_ventasCache) ? _ventasCache : []).map(d => ({
        fecha: d.date || d.day || d.fecha || '',
        ventas: Number(d.total || d.amount || 0),
        ordenes: Number(d.count || d.orders || 0),
        ticket_promedio: Number(d.avg_ticket || (d.count > 0 ? (d.total / d.count) : 0))
      }));
      headers = ['fecha', 'ventas', 'ordenes', 'ticket_promedio'];
    } else if (currentTab === 'productos' || currentTab === 'top-productos') {
      rows = (Array.isArray(_productosCache) ? _productosCache : []).map(p => ({
        nombre: p.name || p.nombre || '',
        cantidad: Number(p.qty || p.cantidad || 0),
        ingresos: Number(p.revenue || p.total || 0)
      }));
      headers = ['nombre', 'cantidad', 'ingresos'];
    } else if (currentTab === 'metodos' || currentTab === 'pagos') {
      rows = (Array.isArray(_metodosCache) ? _metodosCache : []).map(m => ({
        metodo: m.method || m.metodo || '',
        ventas: Number(m.total || m.amount || 0),
        porcentaje: Number(m.pct || m.percent || 0)
      }));
      headers = ['metodo', 'ventas', 'porcentaje'];
    } else if (currentTab === 'cajeros') {
      rows = (Array.isArray(_cajerosCache) ? _cajerosCache : []).map(c => ({
        cajero: c.name || c.user || '',
        ventas: Number(c.total || 0),
        ordenes: Number(c.count || 0)
      }));
      headers = ['cajero', 'ventas', 'ordenes'];
    } else {
      // Fallback genérico: si no reconocemos el tab, intentar exportar lo que sea esté en cache
      const candidates = [_ventasCache, _productosCache, _metodosCache, _cajerosCache].filter(x => Array.isArray(x) && x.length);
      if (candidates.length) {
        rows = candidates[0];
        headers = Object.keys(rows[0] || {});
      }
    }
  } catch (e) {}

  if (!rows.length) {
    toast('No hay datos para exportar en este reporte', 'warn');
    return;
  }
  const meta = `# Volvix POS · ${currentTab} · Período: ${currentPeriod} · Generado: ${new Date().toLocaleString('es-MX')}\r\n`;
  const csv = meta + _toCSV(rows, headers);
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `reporte_volvix_${nombre}_${currentPeriod}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('✓ Reporte exportado (' + rows.length + ' filas)', 'ok');
}

// ── Toast ──
function toast(msg, type='info') {
  if (window.volvix?.utils?.toast) { window.volvix.utils.toast(msg, type); return; }
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));
});

// ── INIT ──
window.volvix.ready(() => { renderVentas(); });
</script>
</body>
</html>
