<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reservar cita · Volvix</title>
<meta name="description" content="Agenda tu cita en línea de forma rápida y segura">
<link rel="canonical" href="https://volvix-pos.vercel.app/volvix-booking.html">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,-apple-system,sans-serif;background:#0A0A0A;color:#FAFAF9;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:16px}
h1{font-size:24px;margin:0 0 8px;color:#FBBF24}
.sub{color:#A8A29E;font-size:14px;margin-bottom:24px}
.steps{display:flex;justify-content:space-between;margin-bottom:24px;gap:8px}
.step{flex:1;text-align:center;padding:8px 4px;font-size:11px;border-radius:8px;background:rgba(255,255,255,.04);color:#78716C}
.step.active{background:#FBBF24;color:#0A0A0A;font-weight:700}
.step.done{background:rgba(16,185,129,.2);color:#10B981}
.opt{display:block;width:100%;padding:14px 16px;margin-bottom:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#FAFAF9;cursor:pointer;text-align:left;font-size:14px;transition:all .2s}
.opt:hover,.opt.sel{border-color:#FBBF24;background:rgba(251,191,36,.08)}
.opt strong{display:block;color:#FBBF24;margin-bottom:4px}
.opt small{color:#A8A29E;font-size:12px}
input,textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:#FAFAF9;font-size:14px;font-family:inherit;margin-bottom:12px}
input:focus,textarea:focus{outline:none;border-color:#3B82F6}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:16px 0}
.cal .h{text-align:center;font-size:11px;color:#78716C;padding:6px}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:6px;cursor:pointer;font-size:13px;color:#FAFAF9;transition:all .15s}
.cal .d.muted{opacity:.3;cursor:default}
.cal .d.today{border:1px solid #FBBF24}
.cal .d.sel{background:#FBBF24;color:#0A0A0A;font-weight:700}
.cal .d.disabled{opacity:.2;cursor:not-allowed}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:12px}
.slot{padding:10px;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;cursor:pointer;font-size:13px;color:#FAFAF9}
.slot:hover{border-color:#FBBF24}
.slot.sel{background:#FBBF24;color:#0A0A0A;font-weight:700}
.slot.taken{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.btn{display:inline-block;padding:14px 28px;background:linear-gradient(135deg,#F59E0B,#FBBF24);color:#0A0A0A;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent;border:1px solid #78716C;color:#FAFAF9}
.row{display:flex;gap:8px}
.row .btn{flex:1}
.success{text-align:center;padding:32px}
.success .icon{font-size:64px;margin-bottom:16px}
.success h2{color:#10B981;margin:0 0 8px}
.success p{color:#A8A29E;margin:0 0 24px}
.tag{display:inline-block;padding:4px 8px;background:rgba(251,191,36,.15);color:#FBBF24;border-radius:6px;font-size:11px;font-weight:700;margin-right:6px}
@media(max-width:600px){.wrap{padding:16px 12px}.card{padding:16px}h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>📅 Reservar cita</h1>
    <div class="sub">Agenda en menos de 1 minuto</div>
    <div class="steps">
      <div class="step active" data-s="1">1. Servicio</div>
      <div class="step" data-s="2">2. Staff</div>
      <div class="step" data-s="3">3. Día/Hora</div>
      <div class="step" data-s="4">4. Datos</div>
      <div class="step" data-s="5">✓</div>
    </div>

    <!-- STEP 1 -->
    <div id="s1">
      <h3 style="margin-top:0">¿Qué servicio necesitas?</h3>
      <div id="services"><em style="color:#78716C">Cargando...</em></div>
    </div>

    <!-- STEP 2 -->
    <div id="s2" hidden>
      <h3 style="margin-top:0">¿Con quién prefieres atenderte?</h3>
      <button class="opt" data-staff="">
        <strong>Cualquier persona disponible</strong>
        <small>Te asignamos al primer disponible</small>
      </button>
      <div id="staff"></div>
      <button class="btn ghost" onclick="goto(1)">← Atrás</button>
    </div>

    <!-- STEP 3 -->
    <div id="s3" hidden>
      <h3 style="margin-top:0">Elige día y hora</h3>
      <div id="month-label" style="text-align:center;margin-bottom:8px;color:#FBBF24;font-weight:700"></div>
      <div class="cal">
        <div class="h">D</div><div class="h">L</div><div class="h">M</div><div class="h">M</div><div class="h">J</div><div class="h">V</div><div class="h">S</div>
        <div id="cal-days" style="grid-column:1/-1;display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div>
      </div>
      <div id="slots" class="slots"></div>
      <div style="height:12px"></div>
      <button class="btn ghost" onclick="goto(2)">← Atrás</button>
    </div>

    <!-- STEP 4 -->
    <div id="s4" hidden>
      <h3 style="margin-top:0">Tus datos</h3>
      <div id="resume" style="padding:12px;background:rgba(251,191,36,.08);border-radius:8px;margin-bottom:16px;font-size:13px;color:#FBBF24"></div>
      <input id="f-name" placeholder="Tu nombre completo *" required>
      <input id="f-phone" placeholder="Teléfono" type="tel">
      <input id="f-email" placeholder="Email (para confirmación)" type="email">
      <textarea id="f-notes" rows="2" placeholder="Notas (opcional)"></textarea>
      <div class="row">
        <button class="btn ghost" onclick="goto(3)">← Atrás</button>
        <button class="btn" onclick="confirmar()">Reservar ✓</button>
      </div>
    </div>

    <!-- STEP 5 -->
    <div id="s5" hidden class="success">
      <div class="icon">✅</div>
      <h2>¡Reservación confirmada!</h2>
      <p id="conf-text">Te enviamos un email con los detalles.</p>
      <div id="conf-details" style="background:rgba(255,255,255,.04);border-radius:8px;padding:16px;margin-bottom:16px;text-align:left;font-size:13px"></div>
      <button class="btn" onclick="location.reload()">Reservar otra cita</button>
    </div>
  </div>
</div>

<script>
const state = { step:1, service:null, staff:null, date:null, slot:null };
const $ = id => document.getElementById(id);

function goto(n) {
  state.step = n;
  document.querySelectorAll('[id^="s"][id$=""]').forEach(el => {
    if (el.id.match(/^s[1-5]$/)) el.hidden = el.id !== 's' + n;
  });
  document.querySelectorAll('.step').forEach(el => {
    const s = +el.dataset.s;
    el.classList.toggle('active', s === n);
    el.classList.toggle('done', s < n);
  });
  if (n === 3) renderCal();
  if (n === 4) renderResume();
}

async function loadServices() {
  try {
    const r = await fetch('/api/services?active=true');
    const data = await r.json();
    const list = data.items || data.services || data.data || [];
    $('services').innerHTML = list.length ? list.map(s => `
      <button class="opt" data-id="${s.id}" onclick="selService('${s.id}', '${(s.name||'').replace(/'/g,"\\'")}', ${s.duration_min || 30}, ${s.price || 0})">
        <strong>${s.name}</strong>
        <small>${s.duration_min || 30} min · $${s.price || 0}</small>
      </button>
    `).join('') : '<em style="color:#78716C">No hay servicios disponibles. Contacta al negocio.</em>';
  } catch (e) {
    $('services').innerHTML = '<em style="color:#EF4444">Error cargando servicios. ¿Backend disponible?</em>';
  }
}

function selService(id, name, dur, price) {
  state.service = { id, name, duration: dur, price };
  loadStaff(id);
  goto(2);
}

async function loadStaff(serviceId) {
  try {
    const r = await fetch('/api/staff?service_id=' + encodeURIComponent(serviceId));
    const data = await r.json();
    const list = data.items || data.staff || [];
    $('staff').innerHTML = list.map(s => `
      <button class="opt" onclick="selStaff('${s.id}', '${(s.name||'').replace(/'/g,"\\'")}')">
        <strong>${s.name}</strong>
        <small>${s.bio || s.role || 'Staff'}</small>
      </button>
    `).join('');
  } catch (e) {}
}

window.selStaff = function(id, name) {
  state.staff = id ? { id, name } : null;
  goto(3);
};

document.querySelector('[data-staff=""]').onclick = () => { state.staff = null; goto(3); };

let currentMonth = new Date();
function renderCal() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  $('month-label').textContent = currentMonth.toLocaleDateString('es-MX', { month:'long', year:'numeric' });
  const first = new Date(y, m, 1).getDay();
  const last = new Date(y, m+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  for (let i=0;i<first;i++) html += '<div class="d muted"></div>';
  for (let d=1; d<=last; d++) {
    const date = new Date(y,m,d);
    const past = date < today;
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = past ? 'd disabled' : (date.getTime() === today.getTime() ? 'd today' : 'd');
    html += `<div class="${cls}" ${past?'':`onclick="selDate('${iso}')"`}>${d}</div>`;
  }
  $('cal-days').innerHTML = html;
}

window.selDate = async function(iso) {
  state.date = iso;
  document.querySelectorAll('.cal .d').forEach(el => el.classList.remove('sel'));
  event.target.classList.add('sel');
  $('slots').innerHTML = '<em style="color:#78716C">Cargando horarios...</em>';
  try {
    const params = new URLSearchParams({ date: iso, service_id: state.service.id });
    if (state.staff) params.set('staff_id', state.staff.id);
    const r = await fetch('/api/appointments/availability?' + params);
    const data = await r.json();
    const slots = data.slots || generateMockSlots();
    $('slots').innerHTML = slots.map(s =>
      `<div class="slot${s.taken ? ' taken' : ''}" ${s.taken?'':`onclick="selSlot('${s.time}')"`}>${s.time}</div>`
    ).join('');
  } catch (e) {
    $('slots').innerHTML = generateMockSlots().map(s =>
      `<div class="slot" onclick="selSlot('${s.time}')">${s.time}</div>`
    ).join('');
  }
};

function generateMockSlots() {
  const slots = [];
  for (let h=9; h<19; h++) {
    slots.push({ time: `${String(h).padStart(2,'0')}:00`, taken: false });
    slots.push({ time: `${String(h).padStart(2,'0')}:30`, taken: false });
  }
  return slots;
}

window.selSlot = function(time) {
  state.slot = time;
  document.querySelectorAll('.slot').forEach(el => el.classList.remove('sel'));
  event.target.classList.add('sel');
  setTimeout(() => goto(4), 200);
};

function renderResume() {
  $('resume').innerHTML = `
    <strong>${state.service.name}</strong> · ${state.service.duration} min · $${state.service.price}<br>
    📅 ${state.date} · 🕐 ${state.slot}<br>
    ${state.staff ? '👤 ' + state.staff.name : '👤 Cualquier disponible'}
  `;
}

async function confirmar() {
  const name = $('f-name').value.trim();
  const phone = $('f-phone').value.trim();
  const email = $('f-email').value.trim();
  const notes = $('f-notes').value.trim();
  if (!name) { alert('Tu nombre es requerido'); return; }

  const payload = {
    service_id: state.service.id,
    staff_id: state.staff?.id || null,
    customer_name: name,
    customer_phone: phone,
    customer_email: email,
    starts_at: `${state.date}T${state.slot}:00`,
    notes
  };

  try {
    const r = await fetch('/api/appointments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');

    $('conf-details').innerHTML = `
      <div><strong>Servicio:</strong> ${state.service.name}</div>
      <div><strong>Fecha:</strong> ${state.date} · ${state.slot}</div>
      <div><strong>Cliente:</strong> ${name}</div>
      ${email ? `<div><strong>Confirmación a:</strong> ${email}</div>` : ''}
      ${data.id ? `<div style="margin-top:8px"><span class="tag">ID: ${String(data.id).slice(0,8)}</span></div>` : ''}
    `;
    if (email) $('conf-text').textContent = `Te enviamos un email a ${email} con los detalles.`;
    goto(5);
  } catch (e) {
    alert('Error reservando: ' + e.message + '\n¿Sin internet o backend caído?');
  }
}

loadServices();
</script>
<script defer src="/volvix-modules-wiring.js"></script>
</body>
</html>
