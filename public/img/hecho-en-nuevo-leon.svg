<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" width="320" height="130" role="img" aria-label="Hecho en Nuevo León, México">
  <!-- Lion icon panel (orange square with white lion silhouette) -->
  <rect x="0" y="0" width="120" height="130" rx="8" fill="#F58220"/>
  <!-- Stylized lion head silhouette in white -->
  <g fill="#fff" transform="translate(60 65)">
    <!-- Mane outer -->
    <path d="M -50 -45 Q -52 -10 -45 18 Q -42 28 -32 36 L -28 28 Q -25 18 -22 8 Q -18 -8 -10 -22 Q -2 -36 8 -42 Q 22 -46 32 -38 Q 44 -28 48 -10 Q 52 12 46 28 Q 42 34 36 38 L 32 28 Q 28 14 24 6 Q 18 -10 4 -16 Q -10 -18 -22 -8 Q -32 4 -36 18 Q -38 28 -36 38 L -42 36 Q -50 22 -50 -2 Z"/>
    <!-- Face center -->
    <ellipse cx="0" cy="-2" rx="14" ry="16" fill="#F58220"/>
    <ellipse cx="0" cy="-4" rx="12" ry="14" fill="#fff"/>
    <!-- Eyes -->
    <rect x="-7" y="-8" width="3" height="5" fill="#F58220"/>
    <rect x="4" y="-8" width="3" height="5" fill="#F58220"/>
    <!-- Snout -->
    <path d="M -5 0 Q 0 4 5 0 L 4 6 Q 0 8 -4 6 Z" fill="#F58220"/>
    <!-- Mouth/beard -->
    <path d="M -8 8 Q -10 18 -6 24 L 0 20 L 6 24 Q 10 18 8 8 Q 4 12 0 12 Q -4 12 -8 8 Z" fill="#F58220"/>
  </g>
  <!-- Text panel -->
  <g fill="#F58220" font-family="Inter, Arial Black, sans-serif" font-weight="900">
    <text x="130" y="32" font-size="22" letter-spacing="-0.5">HECHO EN</text>
    <text x="130" y="60" font-size="30" letter-spacing="-1">NUEVO</text>
    <text x="130" y="92" font-size="30" letter-spacing="-1">LEÓN</text>
    <text x="130" y="116" font-size="14" letter-spacing="6">MÉXICO</text>
  </g>
</svg>
