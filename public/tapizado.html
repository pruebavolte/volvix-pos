<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapizado — El sistema para lavado de muebles que entrega salas y colchones impecables</title>
<meta name="description" content="El sistema para zapaterías que sí cuentan cada par.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- TODAS las fuentes necesarias para cualquier marca -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=Bodoni+Moda:ital,wght@0,500;0,700;1,500&family=Archivo+Black&family=Oswald:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Italianno&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body-font);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
    overflow-x:hidden;
    font-size:15px;
    transition:background-color .4s ease,color .4s ease;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  img{max-width:100%;display:block}
  ::selection{background:var(--accent);color:var(--bg)}

  .container{max-width:1280px;margin:0 auto;padding:0 28px;position:relative;z-index:2}

  /* ============================================
     PICKER (cuando no hay ?b= en la URL)
     ============================================ */
  #picker{
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:64px 28px;
    background:#FAFAF7;
    color:#0A0908;
  }
  #picker h1{font-family:Fraunces,serif;font-size:48px;font-weight:400;letter-spacing:-.03em;margin-bottom:14px}
  #picker h1 em{font-style:italic;color:#C2410C}
  #picker p{font-size:17px;color:#6B6B68;margin-bottom:36px;max-width:560px;text-align:center}
  .picker-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;max-width:980px;width:100%}
  .picker-card{
    background:#fff;border:1px solid #E3E0D6;padding:24px;
    border-radius:14px;transition:all .25s ease;cursor:pointer;
    display:flex;flex-direction:column;gap:6px;text-decoration:none;color:inherit;
  }
  .picker-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px -8px rgba(0,0,0,.1);border-color:#0A0908}
  .picker-brand{font-family:Fraunces,serif;font-size:24px;letter-spacing:-.02em;font-weight:500}
  .picker-giro{font-size:13px;color:#6B6B68}

  #app{display:none}
  body.loaded #app{display:block}
  body.loaded #picker{display:none}

  /* ============================================
     NAV
     ============================================ */
  .vmotor-nav{
    position:sticky;top:0;z-index:50;
    background:color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
  .v-logo{
    display:flex;align-items:center;gap:10px;
    font-family:var(--display-font);font-weight:500;font-size:22px;
    color:var(--ink);letter-spacing:-.02em;
  }
  .v-logo-mark{
    width:34px;height:34px;background:var(--accent);color:var(--bg);
    display:grid;place-items:center;
    font-family:var(--display-font);font-weight:600;font-size:18px;
    border-radius:6px;transition:transform .3s ease;
  }
  .v-logo:hover .v-logo-mark{transform:rotate(-6deg)}
  .v-nav-links{display:flex;gap:28px;align-items:center;font-size:14px;color:var(--muted);font-weight:500}
  .v-nav-links a:hover{color:var(--ink)}
  .v-nav-cta{display:flex;gap:10px;align-items:center}
  .v-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:11px 20px;border-radius:10px;
    font-size:14px;font-weight:600;
    border:1px solid transparent;transition:all .25s ease;
    text-decoration:none;cursor:pointer;
  }
  .v-btn-primary{background:var(--ink);color:var(--bg)}
  .v-btn-primary:hover{background:var(--accent);transform:translateY(-1px)}
  .v-btn-ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .v-btn-ghost:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .v-btn-lg{padding:15px 28px;font-size:15px;border-radius:12px}

  /* ============================================
     HERO (split: copy + hero image)
     ============================================ */
  .v-hero{
    padding:64px 0 80px;
    position:relative;
  }
  .v-hero-grid{
    display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;
  }
  .v-hero-eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    padding:7px 14px;background:var(--surface);
    border:1px solid var(--line);border-radius:999px;
    font-size:12px;color:var(--muted);font-weight:500;margin-bottom:28px;
  }
  .v-hero-eyebrow::before{
    content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 color-mix(in srgb, var(--accent) 60%, transparent)}
    50%{box-shadow:0 0 0 10px transparent}
  }
  .v-h1{
    font-family:var(--display-font);
    font-size:clamp(48px,7vw,96px);
    font-weight:500;line-height:.95;
    letter-spacing:-.035em;color:var(--ink);
    margin-bottom:24px;
  }
  .v-h1 em{font-style:italic;color:var(--accent);font-weight:400}
  .v-deck{
    font-size:18px;color:var(--ink2);
    line-height:1.55;margin-bottom:36px;max-width:520px;
    padding-left:14px;border-left:2px solid var(--accent);
  }
  .v-ctas{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:32px}
  .v-meta-line{
    font-family:var(--mono-font);font-size:12px;
    color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
  }

  .v-hero-image{
    aspect-ratio:3/4;
    overflow:hidden;
    background:var(--paper);
    border:1px solid var(--line);
    position:relative;
  }
  .v-hero-image img{
    width:100%;height:100%;object-fit:cover;
    filter:contrast(1.05) saturate(.95);
  }
  .v-hero-image::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 50%,color-mix(in srgb, var(--ink) 20%, transparent) 100%);
    pointer-events:none;
  }
  .v-hero-pricing{
    position:absolute;top:24px;right:24px;
    background:var(--bg);border:1px solid var(--ink);
    padding:14px 18px;text-align:center;z-index:2;
  }
  .v-hero-pricing-tag{font-family:var(--mono-font);font-size:10px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase}
  .v-hero-pricing-v{font-family:var(--display-font);font-weight:500;font-size:32px;line-height:1;color:var(--ink);margin:4px 0}
  .v-hero-pricing-sub{font-family:var(--mono-font);font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}

  /* ============================================
     GALLERY — masonry rica de imágenes del giro
     ============================================ */
  .v-gallery{
    padding:96px 0;background:var(--paper);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .v-gallery-head{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:end;margin-bottom:40px;border-bottom:1px solid var(--line);padding-bottom:24px}
  .v-section-tag{
    font-family:var(--mono-font);font-size:11px;
    color:var(--accent);text-transform:uppercase;letter-spacing:.18em;
    margin-bottom:12px;display:flex;align-items:center;gap:10px;
  }
  .v-section-tag::before{content:"";width:24px;height:1px;background:var(--accent)}
  .v-section-h{
    font-family:var(--display-font);
    font-size:clamp(36px,5vw,64px);
    font-weight:500;line-height:1;letter-spacing:-.03em;
    color:var(--ink);
  }
  .v-section-h em{font-style:italic;color:var(--accent);font-weight:400}
  .v-gallery-credits{
    font-family:var(--mono-font);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.15em;text-align:right;line-height:1.7;
  }
  .v-gallery-credits b{color:var(--ink);font-weight:600}

  .v-gallery-grid{
    display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:140px;gap:12px;
  }
  .v-gallery-item{
    position:relative;overflow:hidden;border-radius:12px;
    background:var(--surface);cursor:pointer;
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .v-gallery-item:hover{transform:translateY(-4px)}
  .v-gallery-item img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .7s ease;
  }
  .v-gallery-item:hover img{transform:scale(1.07)}
  .v-gallery-item::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,.55) 100%);
    opacity:0;transition:opacity .3s ease;
  }
  .v-gallery-item:hover::after{opacity:1}
  .v-gallery-item .tag{
    position:absolute;bottom:14px;left:14px;
    color:#fff;font-size:13px;font-weight:500;
    background:rgba(0,0,0,.55);padding:5px 12px;border-radius:6px;
    backdrop-filter:blur(4px);
    opacity:0;transform:translateY(8px);
    transition:all .3s ease;z-index:1;
  }
  .v-gallery-item:hover .tag{opacity:1;transform:translateY(0)}
  .v-gallery-item.lg{grid-column:span 2;grid-row:span 2}
  .v-gallery-item.md{grid-column:span 2;grid-row:span 1}
  .v-gallery-item.sm{grid-column:span 1;grid-row:span 1}

  /* ============================================
     CONTEXT IMAGES — 3 fotos con caption
     ============================================ */
  .v-context{padding:96px 0;background:var(--bg)}
  .v-context-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:24px;
    margin-top:40px;
  }
  .v-context-card{
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;
    transition:all .3s ease;
  }
  .v-context-card:hover{transform:translateY(-4px);box-shadow:0 16px 32px -12px rgba(0,0,0,.1)}
  .v-context-img{
    aspect-ratio:4/3;background:var(--paper);position:relative;overflow:hidden;
  }
  .v-context-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
  .v-context-card:hover .v-context-img img{transform:scale(1.05)}
  .v-context-card-body{padding:22px 24px}
  .v-context-num{
    font-family:var(--display-font);font-style:italic;font-size:14px;
    color:var(--accent);margin-bottom:6px;
  }
  .v-context-cap{
    font-family:var(--display-font);font-weight:500;
    font-size:18px;letter-spacing:-.01em;color:var(--ink);
    line-height:1.3;
  }

  /* ============================================
     FEATURES — 6 funciones específicas
     ============================================ */
  .v-features{padding:96px 0;background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .v-features-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
    background:var(--line);border:1px solid var(--line);
    border-radius:16px;overflow:hidden;margin-top:40px;
  }
  .v-feat{background:var(--surface);padding:32px 28px;transition:background .25s ease}
  .v-feat:hover{background:var(--paper)}
  .v-feat-ico{
    width:44px;height:44px;background:var(--ink);color:var(--bg);
    border-radius:10px;display:grid;place-items:center;margin-bottom:18px;
    transition:all .25s ease;
  }
  .v-feat:hover .v-feat-ico{background:var(--accent);transform:rotate(-4deg)}
  .v-feat h3{
    font-family:var(--display-font);font-size:20px;font-weight:500;
    letter-spacing:-.01em;margin-bottom:8px;color:var(--ink);
  }
  .v-feat p{font-size:14px;color:var(--muted);line-height:1.55}

  /* ============================================
     STATS
     ============================================ */
  .v-stats{
    padding:80px 0;background:var(--ink);color:var(--bg);
    position:relative;overflow:hidden;
  }
  .v-stats::before{
    content:"";position:absolute;top:-40%;right:-15%;
    width:600px;height:600px;
    background:radial-gradient(circle,color-mix(in srgb, var(--accent) 25%, transparent) 0%,transparent 60%);
    pointer-events:none;
    animation:slowRotate 30s linear infinite;
  }
  @keyframes slowRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .v-stats-inner{position:relative;z-index:1}
  .v-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid rgba(255,255,255,.15)}
  .v-stat{padding:32px 24px 0 0;border-right:1px solid rgba(255,255,255,.15)}
  .v-stat:last-child{border-right:none}
  .v-stat:not(:first-child){padding-left:24px}
  .v-stat-v{
    font-family:var(--display-font);font-weight:500;
    font-size:clamp(48px,6vw,76px);line-height:1;letter-spacing:-.03em;
    color:var(--bg);margin-bottom:8px;font-variant-numeric:tabular-nums;
  }
  .v-stat-l{font-size:13px;color:rgba(255,255,255,.65);line-height:1.45}

  /* ============================================
     PULL QUOTE
     ============================================ */
  .v-quote{padding:120px 0;text-align:center;background:var(--bg);position:relative}
  .v-quote::before{
    content:"\201C";
    position:absolute;top:50%;left:50%;
    font-family:var(--display-font);font-size:280px;font-weight:500;
    color:color-mix(in srgb, var(--accent) 12%, transparent);
    transform:translate(-50%,-50%);line-height:.5;
    pointer-events:none;
  }
  .v-quote-inner{position:relative;z-index:1;max-width:880px;margin:0 auto}
  .v-quote-text{
    font-family:var(--display-font);font-weight:400;font-style:italic;
    font-size:clamp(24px,2.8vw,40px);line-height:1.25;letter-spacing:-.015em;
    color:var(--ink);margin-bottom:32px;
  }
  .v-quote-text .hl{
    background:color-mix(in srgb, var(--accent) 25%, transparent);
    padding:0 4px;
  }
  .v-quote-sig{
    font-family:var(--script-font);font-size:36px;color:var(--accent);
    transform:rotate(-2deg);display:inline-block;margin-bottom:8px;line-height:1;
  }
  .v-quote-attr{
    font-family:var(--mono-font);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.18em;
  }

  /* ============================================
     ROBOS — dark section
     ============================================ */
  .v-thefts{
    background:#0A0908;color:#F5F1E8;padding:96px 0;
    position:relative;overflow:hidden;
    border-top:1px solid var(--line);
  }
  .v-thefts::before{
    content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);
    pointer-events:none;
  }
  .v-thefts::after{
    content:"";position:absolute;top:-30%;right:-15%;
    width:600px;height:600px;
    background:radial-gradient(circle,rgba(220,38,38,.18) 0%,transparent 60%);
    pointer-events:none;
  }
  .v-thefts-inner{position:relative;z-index:1}
  .v-thefts-head{text-align:center;margin-bottom:56px}
  .v-thefts-tag{
    display:inline-flex;align-items:center;gap:10px;
    padding:6px 14px;background:rgba(220,38,38,.15);color:#FCA5A5;
    border:1px solid rgba(220,38,38,.4);
    font-family:var(--mono-font);font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.18em;margin-bottom:20px;
  }
  .v-thefts-tag .dot{
    width:8px;height:8px;border-radius:50%;background:#EF4444;
    animation:blinkRed 1.4s infinite;box-shadow:0 0 10px #EF4444;
  }
  @keyframes blinkRed{0%,100%{opacity:1}50%{opacity:.4}}
  .v-thefts-h{
    font-family:var(--display-font);font-weight:500;
    font-size:clamp(34px,4.5vw,60px);line-height:1.05;letter-spacing:-.025em;
    color:#F5F1E8;margin-bottom:14px;
  }
  .v-thefts-h em{font-style:italic;color:#FCA5A5;font-weight:400}
  .v-thefts-lead{font-size:16px;color:#A1A1A1;max-width:580px;margin:0 auto;line-height:1.6}

  .v-theft-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .v-theft{
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);
    border-radius:14px;overflow:hidden;
    transition:all .3s ease;
  }
  .v-theft:hover{transform:translateY(-4px);border-color:rgba(220,38,38,.4)}
  .v-theft-rob{padding:24px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .v-theft-tag{
    font-family:var(--mono-font);font-size:11px;color:#FCA5A5;
    text-transform:uppercase;letter-spacing:.15em;
    margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600;
  }
  .v-theft h4{
    font-family:var(--display-font);font-size:20px;font-weight:500;
    color:#fff;margin-bottom:10px;letter-spacing:-.01em;line-height:1.15;
  }
  .v-theft-rob p{font-size:14px;color:#D4D4D4;line-height:1.6}
  .v-theft-fix{padding:20px 24px 24px;background:rgba(34,197,94,.06)}
  .v-theft-fix-tag{
    font-family:var(--mono-font);font-size:11px;color:#86EFAC;
    text-transform:uppercase;letter-spacing:.15em;
    margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:600;
  }
  .v-theft-fix p{font-size:13.5px;color:#E5E5E5;line-height:1.6}
  .v-theft-fix p strong{color:#86EFAC;font-weight:600}

  /* ============================================
     CTA FINAL
     ============================================ */
  .v-cta{padding:120px 0;text-align:center;background:var(--bg)}
  .v-cta-inner{max-width:880px;margin:0 auto}
  .v-cta-tag{
    font-family:var(--mono-font);font-size:12px;color:var(--accent);
    text-transform:uppercase;letter-spacing:.2em;margin-bottom:18px;
    display:flex;align-items:center;justify-content:center;gap:14px;
  }
  .v-cta-tag::before,.v-cta-tag::after{content:"";width:40px;height:1px;background:var(--accent)}
  .v-cta-h{
    font-family:var(--display-font);font-weight:500;
    font-size:clamp(42px,5.5vw,76px);line-height:1;letter-spacing:-.03em;
    color:var(--ink);margin-bottom:20px;
  }
  .v-cta-h em{font-style:italic;color:var(--accent);font-weight:400}
  .v-cta-p{font-size:18px;color:var(--muted);max-width:520px;margin:0 auto 32px;line-height:1.55}
  .v-cta-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
  .v-cta-checks{
    display:flex;gap:28px;justify-content:center;flex-wrap:wrap;
    padding-top:28px;border-top:1px solid var(--line);
    font-family:var(--mono-font);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.18em;
  }
  .v-cta-checks div{display:flex;align-items:center;gap:8px}
  .v-cta-checks svg{color:var(--accent)}

  /* ============================================
     FOOTER
     ============================================ */
  .v-footer{
    background:var(--paper);border-top:1px solid var(--line);
    padding:48px 0 28px;
  }
  .v-foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:32px}
  .v-foot-brand p{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px;margin-top:14px}
  .v-foot-powered{
    margin-top:18px;padding-top:14px;border-top:1px solid var(--line);
    font-family:var(--mono-font);font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.2em;
  }
  .v-foot-powered b{color:var(--ink)}
  .v-foot-col h5{
    font-family:var(--mono-font);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.15em;margin-bottom:14px;font-weight:600;
  }
  .v-foot-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .v-foot-col a{font-size:14px;color:var(--ink2)}
  .v-foot-col a:hover{color:var(--accent)}
  .v-foot-bottom{
    padding-top:24px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
    font-family:var(--mono-font);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;
  }

  /* ============================================
     VIBES — overrides por familia
     ============================================ */
  /* DARK PREMIUM (Navaja, etc.) */
  body[data-vibe="darkPremium"] .v-h1{text-transform:uppercase;letter-spacing:.01em;font-weight:500}
  body[data-vibe="darkPremium"] .v-h1 em{font-style:normal;text-decoration:underline;text-decoration-color:var(--accent);text-decoration-thickness:4px;text-underline-offset:6px}

  // ============================================
  // APPLY PALETTE + FONTS TO CSS VARS
  // ============================================
  function applyTheme(brand){
    const r = document.documentElement;
    const p = brand.palette;
    r.style.setProperty('--bg',      p.bg);
    r.style.setProperty('--surface', p.surface);
    r.style.setProperty('--paper',   p.paper);
    r.style.setProperty('--ink',     p.ink);
    r.style.setProperty('--ink2',    p.ink2);
    r.style.setProperty('--muted',   p.muted);
    r.style.setProperty('--line',    p.line);
    r.style.setProperty('--accent',  p.accent);
    r.style.setProperty('--accent2', p.accent2 || p.accent);
    r.style.setProperty('--display-font', '"' + brand.fonts.display + '", serif');
    r.style.setProperty('--body-font',    '"' + brand.fonts.body + '", system-ui, sans-serif');
    r.style.setProperty('--script-font',  '"' + brand.fonts.script + '", cursive');
    r.style.setProperty('--mono-font',    '"' + brand.fonts.mono + '", monospace');
    document.body.setAttribute('data-vibe', brand.vibe);

    // SEO
    document.title = brand.brand + ' — ' + brand.tagline;
    const desc = document.querySelector('meta[name="description"]');
    if (desc) desc.setAttribute('content', brand.tagline);
  }

    if (ld.type === 'kds')     widget = renderKdsWidget(ld.data);
    if (ld.type === 'booking') widget = renderBookingWidget(ld.data);

  function renderStockWidget(d){
    const cells = d.stock.map(row => {
      const tds = row.vals.map(v => {
        let cls = v === 0 ? 'zero' : (v <= d.lowThreshold ? 'low' : 'good');
        return `<div class="cell ${cls}">${v}</div>`;
      }).join('');
      return `<div class="color">${row.color}</div>${tds}`;
    }).join('');
    const tallaHeads = d.tallas.map(t => `<div class="head">${t}</div>`).join('');
    const lowCount = d.stock.reduce((acc, row) =>
      acc + row.vals.filter(v => v === 0 || v <= d.lowThreshold).length, 0);
    return `
    <div class="v-widget">
      <div class="v-widget-bar"><span class="live-dot"></span>Inventario en vivo<span class="clock" id="ld-clock">--:--</span></div>
      <div class="v-w-stock">
        <div class="v-w-stock-h">
          <div class="name">${d.product}</div>
          <div class="meta">Stock por talla · color</div>
        </div>
        <div class="v-w-stock-table">
          <div class="head color">Color/Talla</div>
          ${tallaHeads}
          ${cells}
        </div>
        <div class="v-w-stock-foot">
          <span>Total pares: <b id="ld-total">0</b></span>
          <span class="alert">⚠ ${lowCount} tallas críticas</span>
        </div>
      </div>
    </div>`;
  }

  function renderKdsWidget(d){
    const cards = d.orders.map((o, i) => {
      const items = o.items.map(it => {
        const parts = it.split('|');
        return `<li>${parts[0]}${parts[1] ? `<span class="mod">${parts[1]}</span>` : ''}</li>`;
      }).join('');
      const stateLbl = o.state === 'urgent' ? 'EN ESPERA'
                     : o.state === 'prep'   ? 'PREPARANDO'
                     : o.state === 'ready'  ? '✓ LISTO'
                     :                        'EN COLA';
      return `<div class="v-w-kds-card ${o.state}" style="animation-delay:${i*0.1}s">
        <div class="v-w-kds-h">
          <span class="mesa">▸ MESA ${String(o.mesa).padStart(2,'0')}</span>
          <span>${o.time}</span>
        </div>
        <ul class="v-w-kds-items">${items}</ul>
        <div class="v-w-kds-foot"><span>${stateLbl}</span><span>${o.wait}</span></div>
      </div>`;
    }).join('');
    return `
    <div class="v-widget v-w-kds">
      <div class="v-w-kds-bar"><span class="live-dot"></span>Cocina · Sábado<span class="clock" id="ld-clock">--:--:--</span></div>
      <div class="v-w-kds-grid">${cards}</div>

  }

  function renderBookingWidget(d){
    const barberos = d.barberos.map((b, i) => `
      <button class="v-w-book-b ${i === 0 ? 'active' : ''}" data-b="${i}">
        <div class="name">${b.name}</div>
        <div class="role">${b.role}</div>
      </button>`).join('');
    const renderSlots = (idx) => {
      const b = d.barberos[idx] || {};
      // V9.0.2 defensive: taken/active pueden estar en data O en barbero
      const _taken = (b.taken && Array.isArray(b.taken)) ? b.taken : (Array.isArray(d.taken) ? d.taken : []);
      const _active = (b.active !== undefined) ? b.active : d.active;
      return d.slots.map((h, i) => {
        let cls = 'v-w-book-slot';
        if (_taken.indexOf(i) !== -1) cls += ' taken';
        if (_active === i) cls += ' active';
        return `<button class="${cls}">${h}</button>`;
      }).join('');
    };
    return `
    <div class="v-widget">
      <div class="v-widget-bar"><span class="live-dot"></span>Agenda · Hoy<span class="clock" id="ld-date">--</span></div>
      <div class="v-w-book">
        <div class="v-w-book-barberos">${barberos}</div>
        <div class="v-w-book-slots" id="ld-slots">${renderSlots(0)}</div>
        <div class="v-w-book-foot">
          <span>HOY: <b>14</b> citas</span>
          <span>PRÓXIMA: <b>15:00</b></span>
        </div>
      </div>
    </div>`;
  }

          <div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg> Offline 100%</div>
          <div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg> Soporte MX</div>
        </div>
      </div>
    </section>`;
  }

  function renderFooter(b){
    return `<footer class="v-footer">
      <div class="container">
        <div class="v-foot-grid">
          <div class="v-foot-brand">
            <a href="#" class="v-logo">
              <div class="v-logo-mark">${b.brand[0]}</div>
              ${b.brand}
            </a>
            <p>${b.tagline}.</p>
            <div class="v-foot-powered">Powered by <b>Volvix Systems</b></div>
          </div>
          <div class="v-foot-col"><h5>Sistema</h5><ul>
            <li><a href="#galeria">Catálogo</a></li>
            <li><a href="#contexto">En uso</a></li>
            <li><a href="#funciones">Funciones</a></li>
            <li><a href="#perdidas">Pérdidas</a></li>
          </ul></div>
          <div class="v-foot-col"><h5>Empezar</h5><ul>
            <li><a href="/registro.html?giro=zapateria">Crear cuenta</a></li>
            <li><a href="/marketplace.html#pricing">Precios</a></li>
            <li><a href="#demo-vivo">Demo</a></li>
            <li><a href="mailto:soporte@salvadorex.mx">Soporte</a></li>
          </ul></div>
          <div class="v-foot-col"><h5>Volvix</h5><ul>
            <li><a href="../motor.html">Otros giros</a></li>
            <li><a href="/marketplace.html#nosotros">Nosotros</a></li>
            <li><a href="/aviso-privacidad.html">Privacidad</a></li>
            <li><a href="/terminos.html">Términos</a></li>
          </ul></div>
        </div>
        <div class="v-foot-bottom">
          <span>© 2026 ${b.brand} · Una marca de Volvix Systems</span>
          <span>MX · NL · Hecho en México</span>
        </div>
      </div>
    </footer>`;
  }

  // ============================================
  // MAIN RENDER
  // ============================================
  function renderBrand(b){
    applyTheme(b);
    const app = document.getElementById('app');
    app.innerHTML = [
      renderNav(b),
      renderHero(b),
      renderGallery(b),
      renderContext(b),
      renderLiveDemo(b),
      renderFeatures(b),
      renderStats(b),
      renderQuote(b),
      renderThefts(b),
      renderCTA(b),
      renderFooter(b),
      renderStickyCTA(b),
      renderProof(),
    ].join('\n');

    document.body.classList.add('loaded');

    // Count-up animation on stats
    const so = new IntersectionObserver(es => {
      es.forEach(e => {
        if (e.isIntersecting && !e.target.dataset.counted) {
          e.target.dataset.counted = '1';
          countUp(e.target);
        }
      });
    }, {threshold:.5});
    document.querySelectorAll('.v-stat-v[data-target]').forEach(el => so.observe(el));

    // Reveal on scroll
    const ro = new IntersectionObserver(es => {
      es.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
    }, {threshold:.1});
    ['.v-gallery','.v-context','.v-livedemo','.v-features','.v-stats','.v-quote','.v-thefts','.v-cta'].forEach(sel => {
      const el = document.querySelector(sel);
      if (el) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1)';
        ro.observe(el);
      }
    });

    // Wire up live demo widgets
    wireLiveDemo(b);

    // Sticky CTA on scroll
    wireSticky();

    // Social proof toast rotation
    wireProof(b);
  }

  // ============================================
  // LIVE DEMO WIRING
  // ============================================
  function wireLiveDemo(b){
    if (!b.liveDemo) return;
    const type = b.liveDemo.type;

    // Clock for relevant widgets
    const clockEl = document.getElementById('ld-clock');
    if (clockEl) {
      function tick(){
        const d = new Date();
        const h = String(d.getHours()).padStart(2,'0');
        const m = String(d.getMinutes()).padStart(2,'0');
        const s = String(d.getSeconds()).padStart(2,'0');
        clockEl.textContent = type === 'kds' ? `${h}:${m}:${s}` : `${h}:${m}`;
      }
      tick(); setInterval(tick, 1000);
    }

    // STOCK: total counter that count-ups
    if (type === 'stock') {
      const data = b.liveDemo.data;
      const total = data.stock.reduce((acc, row) => acc + row.vals.reduce((a,v)=>a+v,0), 0);
      const totalEl = document.getElementById('ld-total');
      if (totalEl) {
        const so2 = new IntersectionObserver(es => {
          es.forEach(e => {
            if (e.isIntersecting && !totalEl.dataset.counted) {
              totalEl.dataset.counted = '1';
              let start = performance.now();
              const dur = 1500;
              function step(now){
                const p = Math.min((now-start)/dur, 1);
                const eased = 1 - Math.pow(1-p, 3);
                totalEl.textContent = Math.round(total * eased);
                if (p < 1) requestAnimationFrame(step);
              }
              requestAnimationFrame(step);
            }
          });
        }, {threshold:.4});
        so2.observe(totalEl);
      }
    }

    // KDS: countdown timers
    if (type === 'kds') {
      const data = b.liveDemo.data;
      const cards = document.querySelectorAll('.v-w-kds-card .v-w-kds-foot span:last-child');
      const timers = Array.from(cards).map(el => {
        const t = el.textContent.trim();
        if (t.includes(':')) {
          const p = t.split(':');
          return parseInt(p[0]) * 60 + parseInt(p[1]);
        }
        return null;
      });
      setInterval(() => {
        cards.forEach((el, i) => {
          if (timers[i] === null) return;
          timers[i]++;
          const m = String(Math.floor(timers[i] / 60)).padStart(2,'0');
          const s = String(timers[i] % 60).padStart(2,'0');
          el.textContent = m + ':' + s;
        });
      }, 1000);
    }

    // BOOKING: barbero switcher
    if (type === 'booking') {
      const data = b.liveDemo.data;
      const slotsEl = document.getElementById('ld-slots');
      const dateEl = document.getElementById('ld-date');
      if (dateEl) {
        const d = new Date();
        const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        dateEl.textContent = `${d.getDate()} ${months[d.getMonth()].toUpperCase()}`;
      }
      function renderSlots(idx){
        const brb = data.barberos[idx];
        slotsEl.innerHTML = data.slots.map((h, i) => {
          let cls = 'v-w-book-slot';
          if (brb.taken.indexOf(i) !== -1) cls += ' taken';
          if (brb.active === i) cls += ' active';
          return `<button class="${cls}">${h}</button>`;
        }).join('');
      }
      document.querySelectorAll('.v-w-book-b').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.v-w-book-b').forEach(x => x.classList.remove('active'));
          btn.classList.add('active');
          renderSlots(parseInt(btn.dataset.b));
        });
      });
    }
  }

  // ============================================
  // STICKY CTA — appears after 40% scroll
  // ============================================
  function wireSticky(){
    const el = document.getElementById('v-sticky');
    const close = document.getElementById('v-sticky-close');
    if (!el) return;
    let dismissed = sessionStorage.getItem('vlx_sticky_dismissed') === '1';
    if (dismissed) return;
    window.addEventListener('scroll', () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      if (pct > 0.25 && pct < 0.92) {
        el.classList.add('show');
      } else {
        el.classList.remove('show');
      }
    }, {passive:true});
    close.addEventListener('click', () => {
      el.classList.remove('show');
      sessionStorage.setItem('vlx_sticky_dismissed', '1');
    });
  }

  // ============================================
  // SOCIAL PROOF — rotating toasts
  // ============================================
  function wireProof(currentBrand){
    if (typeof SOCIAL_PROOF === 'undefined' || !Array.isArray(SOCIAL_PROOF)) return;
    const toast = document.getElementById('v-proof');
    const ico   = document.getElementById('v-proof-ico');
    const l1    = document.getElementById('v-proof-line1');
    const l2    = document.getElementById('v-proof-line2');
    if (!toast) return;
    // Filter to only show this brand's proofs first, then mix
    const own = SOCIAL_PROOF.filter(p => p.brand === currentBrand.brand);
    const others = SOCIAL_PROOF.filter(p => p.brand !== currentBrand.brand);
    const sequence = [...own, ...others, ...own];
    let i = 0;
    function fire(){
      const p = sequence[i % sequence.length];
      ico.textContent = p.brand[0];
      l1.innerHTML = `<b>${p.brand}</b> — ${p.biz}`;
      l2.textContent = `${p.city} · ${p.when}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 5500);
      i++;
    }
    setTimeout(fire, 6000);
    setInterval(fire, 11000);
  }

  function countUp(el){
    const target = parseFloat(el.dataset.target);
    if (isNaN(target) || target === 0) {
      el.textContent = (el.dataset.prefix||'') + el.dataset.target + (el.dataset.suffix||'');
      return;
    }
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const start = performance.now();
    const dur = 1600;
    function step(now){
      const p = Math.min((now-start)/dur, 1);
      const eased = 1 - Math.pow(1-p, 3);
      const v = Math.round(target * eased);
      const formatted = target >= 1000 ? v.toLocaleString('es-MX') : v;
      el.textContent = prefix + formatted + suffix;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // ============================================
  // PICKER (default home)
  // ============================================
  function renderPicker(){
    const grid = document.getElementById('picker-grid');
    if (!grid) return;
    grid.innerHTML = Object.entries(BRANDS).map(([slug, b]) => `
      <a class="picker-card" href="?b=${slug}">
        <div class="picker-brand" style="color:${b.palette.accent}">${b.brand}</div>
        <div class="picker-giro">Sistema para ${b.giroPlural}</div>
      </a>
    `).join('');
  }

  // ============================================
  // BOOT
  // ============================================
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('b') || params.get('brand');
  if (slug && BRANDS[slug]) {
    // V9.0 defensive: ocultar picker INMEDIATAMENTE (antes incluso del CSS load)
    var _picker = document.getElementById('picker');
    if (_picker) _picker.style.display = 'none';
    renderBrand(BRANDS[slug]);
  } else {
    renderPicker();
  }

})();
</script>
