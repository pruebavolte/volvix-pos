<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvix — POS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#6c47ff;--primary-dark:#4f2fe0;--accent:#00d4aa;--danger:#ff4757;--warn:#ffa502;
    --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;--text:#e8e8f0;--muted:#8888a8;--border:#2a2a3f;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}

  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;
    display:flex;align-items:center;gap:1rem;flex-shrink:0}
  .logo{font-size:1.1rem;font-weight:800}.logo span{color:var(--primary)}
  .header-tag{font-size:.75rem;color:var(--muted);background:var(--bg3);padding:.2rem .5rem;border-radius:5px}
  .header-right{margin-left:auto;display:flex;gap:.7rem;align-items:center}
  .btn{padding:.45rem 1rem;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:#fff;border-color:var(--primary)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-accent{background:var(--accent);color:#000;font-weight:700}

  /* LAYOUT */
  .pos-body{display:grid;grid-template-columns:1fr 360px;flex:1;overflow:hidden}

  /* LEFT: products */
  .products-panel{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
  .products-toolbar{padding:.8rem 1rem;border-bottom:1px solid var(--border);display:flex;gap:.6rem;flex-shrink:0}
  .search-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:#fff;
    padding:.5rem .8rem;border-radius:8px;font-size:.85rem;outline:none}
  .search-input:focus{border-color:var(--primary)}
  .cat-bar{padding:.5rem 1rem;border-bottom:1px solid var(--border);display:flex;gap:.5rem;overflow-x:auto;flex-shrink:0}
  .cat-bar::-webkit-scrollbar{display:none}
  .cat-btn{padding:.3rem .75rem;border-radius:20px;font-size:.78rem;cursor:pointer;
    background:var(--bg3);border:1px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .15s}
  .cat-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
  .products-grid{flex:1;overflow-y:auto;padding:1rem;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem;align-content:start}
  .prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:.9rem .75rem;cursor:pointer;transition:all .15s;text-align:center}
  .prod-card:hover{border-color:var(--primary);background:var(--bg3);transform:translateY(-1px)}
  .prod-card:active{transform:scale(.97)}
  .prod-icon{font-size:1.8rem;margin-bottom:.4rem}
  .prod-name{font-size:.8rem;font-weight:600;margin-bottom:.2rem;line-height:1.2}
  .prod-price{font-size:1rem;font-weight:800;color:var(--accent)}
  .prod-stock{font-size:.7rem;color:var(--muted);margin-top:.2rem}

  /* RIGHT: cart */
  .cart-panel{display:flex;flex-direction:column;background:var(--bg2);overflow:hidden}
  .cart-header{padding:1rem;border-bottom:1px solid var(--border);flex-shrink:0}
  .cart-header h3{font-size:.95rem;font-weight:700}
  .cart-header .cart-meta{font-size:.78rem;color:var(--muted);margin-top:.15rem}
  .cart-items{flex:1;overflow-y:auto;padding:.5rem}
  .cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--muted);font-size:.88rem;gap:.5rem}
  .cart-item{display:flex;align-items:center;gap:.6rem;padding:.6rem .4rem;
    border-bottom:1px solid rgba(42,42,63,.5)}
  .cart-item:last-child{border-bottom:none}
  .ci-name{flex:1;font-size:.85rem;font-weight:500}
  .ci-name small{display:block;color:var(--muted);font-size:.75rem}
  .ci-qty{display:flex;align-items:center;gap:.3rem}
  .qty-btn{background:var(--bg3);border:1px solid var(--border);color:#fff;
    width:22px;height:22px;border-radius:5px;cursor:pointer;font-size:.9rem;
    display:flex;align-items:center;justify-content:center;line-height:1}
  .qty-btn:hover{border-color:var(--primary)}
  .ci-total{font-size:.85rem;font-weight:700;min-width:60px;text-align:right}

  /* CART FOOTER */
  .cart-footer{border-top:1px solid var(--border);padding:1rem;flex-shrink:0}
  .totals{margin-bottom:1rem}
  .total-row{display:flex;justify-content:space-between;font-size:.85rem;padding:.2rem 0;color:var(--muted)}
  .total-row.final{font-size:1.1rem;font-weight:800;color:#fff;padding-top:.5rem;border-top:1px solid var(--border);margin-top:.4rem}
  .payment-methods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.8rem}
  .pm-btn{padding:.5rem;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;
    background:var(--bg3);border:1px solid var(--border);color:var(--muted);text-align:center;transition:all .15s}
  .pm-btn.active{background:rgba(108,71,255,.2);border-color:var(--primary);color:#fff}
  .checkout-btn{width:100%;padding:.8rem;border-radius:10px;font-size:1rem;font-weight:700;
    cursor:pointer;border:none;background:var(--accent);color:#000;transition:all .2s}
  .checkout-btn:hover{filter:brightness(1.1)}
  .checkout-btn:disabled{opacity:.5;cursor:not-allowed}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:90%;max-width:420px}
  .modal-title{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem}
  .receipt{background:var(--bg3);border-radius:10px;padding:1rem;font-family:monospace;font-size:.8rem;margin-bottom:1rem;white-space:pre-wrap;color:var(--text);line-height:1.6}

  /* NUMPAD */
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.8rem}
  .np-btn{background:var(--bg3);border:1px solid var(--border);color:#fff;padding:.7rem;
    border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
  .np-btn:hover{border-color:var(--primary);background:rgba(108,71,255,.15)}
  .amount-display{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    padding:.7rem 1rem;font-size:1.3rem;font-weight:700;text-align:right;margin-bottom:.8rem;font-family:monospace}

  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(3rem);
    background:var(--bg3);border:1px solid var(--border);border-radius:10px;
    padding:.7rem 1.5rem;font-size:.85rem;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.success{border-color:var(--accent);color:var(--accent)}
  .toast.error{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<header>
  <div class="logo">Vol<span>vix</span></div>
  <span class="header-tag">POS</span>
  <div class="header-right">
    <span id="clockDisplay" style="font-size:.82rem;color:var(--muted);font-family:monospace"></span>
    <button class="btn btn-ghost" onclick="location.href='owner.html'">Panel</button>
    <button class="btn btn-ghost" onclick="location.href='inventario.html'">Inventario</button>
  </div>
</header>

<div class="pos-body">
  <!-- PRODUCTS -->
  <div class="products-panel">
    <div class="products-toolbar">
      <input class="search-input" id="searchInput" placeholder="Buscar producto o código..." oninput="filterProducts()">
      <button class="btn btn-ghost" onclick="loadProducts()">↻</button>
    </div>
    <div class="cat-bar" id="catBar"></div>
    <div class="products-grid" id="productsGrid">
      <div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:2rem">Cargando productos...</div>
    </div>
  </div>

  <!-- CART -->
  <div class="cart-panel">
    <div class="cart-header">
      <h3>Venta actual</h3>
      <div class="cart-meta" id="cartMeta">0 productos · $0.00</div>
    </div>

    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <div style="font-size:2rem">🛒</div>
        <span>Agrega productos</span>
      </div>
    </div>

    <div class="cart-footer">
      <div class="totals">
        <div class="total-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="total-row"><span>IVA (16%)</span><span id="iva">$0.00</span></div>
        <div class="total-row"><span>Descuento</span><span id="descuento">$0.00</span></div>
        <div class="total-row final"><span>TOTAL</span><span id="total">$0.00</span></div>
      </div>

      <div class="payment-methods">
        <div class="pm-btn active" data-pm="efectivo" onclick="selectPM(this)">💵 Efectivo</div>
        <div class="pm-btn" data-pm="tarjeta" onclick="selectPM(this)">💳 Tarjeta</div>
        <div class="pm-btn" data-pm="transfer" onclick="selectPM(this)">📲 Transfer</div>
      </div>

      <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" disabled>
        Cobrar
      </button>
    </div>
  </div>
</div>

<!-- COBRO MODAL -->
<div class="modal-overlay" id="cobroModal">
  <div class="modal">
    <div class="modal-title">Cobro en efectivo</div>
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:.8rem">Total a cobrar: <strong id="cobroTotal" style="color:#fff"></strong></div>
    <div class="amount-display" id="amontoRecibido">$0.00</div>
    <div class="numpad" id="numpad"></div>
    <div style="background:var(--bg3);border-radius:8px;padding:.7rem 1rem;margin-bottom:1rem;display:flex;justify-content:space-between">
      <span style="font-size:.85rem;color:var(--muted)">Cambio</span>
      <span id="cambio" style="font-size:1.1rem;font-weight:800;color:var(--accent)">$0.00</span>
    </div>
    <div style="display:flex;gap:.7rem">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('cobroModal')">Cancelar</button>
      <button class="btn btn-accent" style="flex:2" id="btnConfirmarCobro" onclick="confirmarCobro()">Confirmar cobro</button>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="modal">
    <div class="modal-title">Ticket de venta</div>
    <div class="receipt" id="receiptContent"></div>
    <div style="display:flex;gap:.7rem">
      <button class="btn btn-ghost" style="flex:1" onclick="printReceipt()">Imprimir</button>
      <button class="btn btn-primary" style="flex:2" onclick="newSale()">Nueva venta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let cart = [];
let allProducts = [];
let filteredProducts = [];
let currentPM = 'efectivo';
let monto = '';
let lastSale = null;

const DEMO_PRODUCTS = [
  {id:'p1',nombre:'Coca-Cola 600ml',precio:20,stock:50,categoria:'Bebidas',icon:'🥤'},
  {id:'p2',nombre:'Pan de caja',precio:35,stock:30,categoria:'Panadería',icon:'🍞'},
  {id:'p3',nombre:'Leche 1L',precio:28,stock:20,categoria:'Lácteos',icon:'🥛'},
  {id:'p4',nombre:'Jabón antibacterial',precio:22,stock:40,categoria:'Higiene',icon:'🧼'},
  {id:'p5',nombre:'Arroz 1kg',precio:25,stock:60,categoria:'Básicos',icon:'🍚'},
  {id:'p6',nombre:'Aceite 1L',precio:52,stock:15,categoria:'Básicos',icon:'🫙'},
  {id:'p7',nombre:'Agua 1.5L',precio:15,stock:80,categoria:'Bebidas',icon:'💧'},
  {id:'p8',nombre:'Sabritas 45g',precio:18,stock:45,categoria:'Snacks',icon:'🍿'},
  {id:'p9',nombre:'Yogurt Natural',precio:30,stock:12,categoria:'Lácteos',icon:'🥣'},
  {id:'p10',nombre:'Papel Higiénico',precio:55,stock:25,categoria:'Higiene',icon:'🧻'},
  {id:'p11',nombre:'Atún 140g',precio:28,stock:35,categoria:'Básicos',icon:'🐟'},
  {id:'p12',nombre:'Frijoles 500g',precio:32,stock:40,categoria:'Básicos',icon:'🫘'},
];

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2500);
}

function fmt(n) { return '$' + parseFloat(n||0).toFixed(2); }

// CLOCK
setInterval(() => {
  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString();
}, 1000);

// PRODUCTS
async function loadProducts() {
  try {
    const r = await fetch('/api/productos');
    const data = await r.json();
    allProducts = data.length ? data.map(p => ({...p, icon: '📦'})) : DEMO_PRODUCTS;
  } catch { allProducts = DEMO_PRODUCTS; }
  filteredProducts = [...allProducts];
  buildCatBar();
  renderProducts();
}

function buildCatBar() {
  const cats = ['Todos', ...new Set(allProducts.map(p => p.categoria || 'General'))];
  const bar = document.getElementById('catBar');
  bar.innerHTML = cats.map((c,i) => `<div class="cat-btn${i===0?' active':''}" onclick="filterByCat(this,'${c}')">${c}</div>`).join('');
}

function filterByCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filteredProducts = cat === 'Todos' ? [...allProducts] : allProducts.filter(p => (p.categoria||'General') === cat);
  renderProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredProducts = allProducts.filter(p => p.nombre.toLowerCase().includes(q));
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!filteredProducts.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:2rem">Sin productos</div>';
    return;
  }
  grid.innerHTML = filteredProducts.map(p => `
    <div class="prod-card" onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <div class="prod-icon">${p.icon||'📦'}</div>
      <div class="prod-name">${p.nombre}</div>
      <div class="prod-price">${fmt(p.precio)}</div>
      <div class="prod-stock">Stock: ${p.stock??'∞'}</div>
    </div>`).join('');
}

// CART
function addToCart(prod) {
  const existing = cart.find(i => i.id === prod.id);
  if (existing) { existing.qty++; }
  else { cart.push({...prod, qty: 1}); }
  renderCart();
  toast(`+ ${prod.nombre}`, 'success');
}

function updateQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cartItems');
  if (!cart.length) {
    container.innerHTML = '<div class="cart-empty"><div style="font-size:2rem">🛒</div><span>Agrega productos</span></div>';
    updateTotals(0); return;
  }
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="ci-name">${item.nombre}<small>${fmt(item.precio)} c/u</small></div>
      <div class="ci-qty">
        <button class="qty-btn" onclick="updateQty('${item.id}',-1)">−</button>
        <span style="min-width:1.5rem;text-align:center;font-size:.88rem">${item.qty}</span>
        <button class="qty-btn" onclick="updateQty('${item.id}',1)">+</button>
      </div>
      <div class="ci-total">${fmt(item.precio * item.qty)}</div>
    </div>`).join('');

  const subtotal = cart.reduce((s,i) => s + i.precio * i.qty, 0);
  updateTotals(subtotal);
}

function updateTotals(subtotal) {
  const iva = subtotal * 0.16;
  const total = subtotal + iva;
  document.getElementById('subtotal').textContent = fmt(subtotal);
  document.getElementById('iva').textContent = fmt(iva);
  document.getElementById('descuento').textContent = fmt(0);
  document.getElementById('total').textContent = fmt(total);
  document.getElementById('cartMeta').textContent = `${cart.reduce((s,i)=>s+i.qty,0)} productos · ${fmt(total)}`;
  document.getElementById('checkoutBtn').disabled = !cart.length;
  document.getElementById('checkoutBtn').textContent = cart.length ? `Cobrar ${fmt(total)}` : 'Cobrar';
}

// PAYMENT
function selectPM(el) {
  document.querySelectorAll('.pm-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPM = el.dataset.pm;
}

function checkout() {
  if (!cart.length) return;
  const total = cart.reduce((s,i) => s + i.precio * i.qty, 0) * 1.16;
  if (currentPM === 'efectivo') {
    monto = '';
    document.getElementById('cobroTotal').textContent = fmt(total);
    document.getElementById('amontoRecibido').textContent = '$0.00';
    document.getElementById('cambio').textContent = fmt(0);
    document.getElementById('cobroModal').classList.add('open');
  } else {
    processPayment(total, currentPM, total);
  }
}

// NUMPAD
function buildNumpad() {
  const pad = document.getElementById('numpad');
  const keys = ['7','8','9','4','5','6','1','2','3','⌫','0','.'];
  pad.innerHTML = keys.map(k => `<div class="np-btn" onclick="numpadKey('${k}')">${k}</div>`).join('');
}

function numpadKey(k) {
  const total = cart.reduce((s,i) => s + i.precio * i.qty, 0) * 1.16;
  if (k === '⌫') monto = monto.slice(0,-1);
  else if (k === '.' && monto.includes('.')) return;
  else monto += k;
  const val = parseFloat(monto||0);
  document.getElementById('amontoRecibido').textContent = fmt(val);
  document.getElementById('cambio').textContent = fmt(Math.max(0, val - total));
  document.getElementById('btnConfirmarCobro').disabled = val < total;
}

async function confirmarCobro() {
  const total = cart.reduce((s,i) => s + i.precio * i.qty, 0) * 1.16;
  const recibido = parseFloat(monto||0);
  await processPayment(total, 'efectivo', recibido);
  closeModal('cobroModal');
}

async function processPayment(total, metodo, recibido) {
  const venta = {
    items: cart.map(i => ({id:i.id,nombre:i.nombre,qty:i.qty,precio:i.precio})),
    subtotal: total / 1.16,
    iva: total * 0.16 / 1.16,
    total,
    metodo_pago: metodo,
    recibido,
    cambio: recibido - total,
    fecha: new Date().toISOString(),
  };
  try {
    await fetch('/api/ventas', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(venta) });
  } catch (_) {}
  lastSale = venta;
  showReceipt(venta);
}

function showReceipt(v) {
  const lines = [
    '================================',
    '         VOLVIX POS',
    `  ${new Date(v.fecha).toLocaleString()}`,
    '--------------------------------',
    ...v.items.map(i => `${i.nombre.padEnd(18).slice(0,18)} x${i.qty}  ${fmt(i.precio*i.qty)}`),
    '--------------------------------',
    `${'Subtotal'.padEnd(20)} ${fmt(v.subtotal)}`,
    `${'IVA 16%'.padEnd(20)} ${fmt(v.iva)}`,
    `${'TOTAL'.padEnd(20)} ${fmt(v.total)}`,
    `${'Pago'.padEnd(20)} ${fmt(v.recibido)}`,
    v.cambio > 0 ? `${'Cambio'.padEnd(20)} ${fmt(v.cambio)}` : '',
    '--------------------------------',
    '      ¡Gracias por su compra!',
    '================================',
  ].filter(Boolean).join('\n');
  document.getElementById('receiptContent').textContent = lines;
  document.getElementById('receiptModal').classList.add('open');
}

function printReceipt() { window.print(); }
function newSale() { cart = []; renderCart(); closeModal('receiptModal'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

buildNumpad();
loadProducts();
</script>
</body>
</html>
