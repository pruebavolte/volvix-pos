<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reservaciones · Vista cliente</title>
<style>
  :root {
    --bg: #F5F5F4; --surface: #FFFFFF; --border: #E0DEDB; --border-strong: #C9C7C3;
    --text: #1C1917; --text-2: #57534E; --text-3: #A8A29E;
    --accent: #2563EB; --accent-soft: #DBEAFE; --success: #16A34A; --warn: #F59E0B; --danger: #DC2626;
  }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; background:var(--bg); color:var(--text); }
  .hd { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--border); background:#fff; }
  .hd h1 { margin:0; font-size:18px; font-weight:700; }
  .hd .sub { color:var(--text-2); font-size:12px; }
  .toolbar { display:flex; gap:8px; padding:10px 18px; background:#fff; border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
  .btn { font:13px/1 inherit; padding:8px 14px; border:1px solid var(--border-strong); background:#fff; border-radius:7px; cursor:pointer; color:var(--text); }
  .btn:hover { background:var(--bg); }
  .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
  .btn.accent:hover { background:#1d4ed8; }
  .btn.ghost { border-color:var(--border); color:var(--text-2); }
  .date-input { padding:7px 10px; font:13px inherit; border:1px solid var(--border-strong); border-radius:7px; background:#fff; color:var(--text); }

  .kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:14px 18px; }
  .kpi { background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .kpi .lbl { font-size:11px; color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; }
  .kpi .val { font-size:22px; font-weight:700; margin-top:4px; }
  .kpi .delta { font-size:11px; color:var(--text-3); margin-top:2px; }

  .layout { display:grid; grid-template-columns: 1fr 320px; gap:14px; padding:14px 18px; align-items:start; }
  .calendar { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .cal-head { padding:10px 14px; border-bottom:1px solid var(--border); font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .grid { display:grid; }
  .grid-head { background:#FAFAF9; }
  .cell-h { padding:10px 8px; font-size:11px; font-weight:600; color:var(--text-2); text-transform:uppercase; text-align:center; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
  .cell-h:last-child { border-right:0; }
  .row-time { padding:10px 8px; font-size:12px; color:var(--text-2); text-align:right; border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:#FAFAF9; }
  .cell { min-height:42px; padding:4px 4px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); position:relative; cursor:pointer; }
  .cell:last-child { border-right:0; }
  .cell:hover { background:var(--accent-soft); }
  .cell.has { background:#fff; }
  .rsv {
    display:block; padding:4px 6px; background:var(--accent); color:#fff;
    font-size:11px; font-weight:600; border-radius:5px; line-height:1.25;
    text-overflow:ellipsis; overflow:hidden; white-space:nowrap;
  }
  .rsv.pending   { background:#92400E; }
  .rsv.confirmed { background:var(--accent); }
  .rsv.seated    { background:#065F46; }
  .rsv.completed { background:#374151; }
  .rsv.cancelled { background:#991B1B; opacity:.65; text-decoration:line-through; }

  .side { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; }
  .side h3 { margin:0 0 10px; font-size:13px; text-transform:uppercase; color:var(--text-2); letter-spacing:.4px; font-weight:600; }
  .upcoming { list-style:none; margin:0; padding:0; }
  .upcoming li { padding:10px 0; border-bottom:1px solid var(--border); }
  .upcoming li:last-child { border-bottom:0; }
  .up-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .up-time { font-weight:700; font-size:14px; }
  .up-name { font-size:13px; color:var(--text); }
  .up-meta { font-size:11px; color:var(--text-3); margin-top:2px; }
  .up-st { font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }
  .up-st.pending   { background:#FEF3C7; color:#92400E; }
  .up-st.confirmed { background:var(--accent-soft); color:#1d4ed8; }
  .up-st.seated    { background:#D1FAE5; color:#065F46; }
  .up-st.cancelled { background:#FEE2E2; color:#991B1B; }
  .actions { display:flex; gap:6px; margin-top:6px; }
  .actions button { font-size:11px; padding:4px 8px; }
  @media (max-width:900px){ .layout{ grid-template-columns:1fr; } .kpi-row{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<div class="hd">
  <div style="font-size:22px;">📅</div>
  <div style="flex:1;">
    <h1>Reservaciones</h1>
    <div class="sub">Vista del cliente · Calendario de mesas, slots horarios y waitlist</div>
  </div>
</div>

<div class="toolbar">
  <button class="btn accent" data-act="nueva">+ Nueva reserva</button>
  <button class="btn" data-act="mesas">🪑 Mesas</button>
  <button class="btn" data-act="waitlist">⏳ Lista de espera</button>
  <span style="margin:0 6px;"></span>
  <button class="btn ghost" data-act="prev-day">‹ Día anterior</button>
  <input type="date" class="date-input" id="d">
  <button class="btn ghost" data-act="next-day">Día siguiente ›</button>
  <button class="btn" data-act="today">Hoy</button>
  <span style="margin-left:auto;font-size:11px;color:var(--text-3);">Slots: 30 min · 12:00–23:00 · Recordatorios 24h y 2h antes</span>
</div>

<div class="kpi-row" id="kpis"></div>

<div class="layout">
  <div class="calendar">
    <div class="cal-head"><span id="cal-day-label">—</span><span id="cal-count" style="font-size:12px;font-weight:500;color:var(--text-2);">0 reservaciones</span></div>
    <div id="grid-wrap"></div>
  </div>
  <div class="side">
    <h3>Próximas (hoy)</h3>
    <ul class="upcoming" id="upcoming"></ul>
  </div>
</div>

<!-- API real -->
<script src="volvix-reservations-wiring.js"></script>

<script>
(function () {
  'use strict';

  function api(){ return window.ReservationsAPI; }

  function todayStr(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function fmtDateLabel(s){
    if (!s) return '—';
    const [y,m,d] = s.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    return dias[dt.getDay()] + ', ' + d + ' de ' + meses[m-1];
  }
  function $(s){ return document.querySelector(s); }
  function esc(s){ return String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

  function seedDemoIfEmpty(){
    if (!api()) {
      document.body.insertAdjacentHTML('beforeend',
        '<div style="padding:16px;color:#991B1B;background:#FEE2E2;margin:18px;border-radius:8px;">' +
        '⚠️ API ReservationsAPI no disponible (verifica que volvix-reservations-wiring.js esté cargando).</div>');
      return;
    }
    const tables = api().tables.list();
    if (tables.length === 0) {
      try {
        api().tables.add('Mesa 1',  2);
        api().tables.add('Mesa 2',  4);
        api().tables.add('Mesa 3',  4);
        api().tables.add('Mesa 4',  6);
        api().tables.add('Terraza', 8);
      } catch(_) {}
    }
    // Crear 4 reservas demo si no hay ninguna para hoy
    const today = todayStr();
    const existing = api().reservations.list({ date: today });
    if (existing && existing.length === 0) {
      const ts  = api().tables.list();
      const t   = (i) => (ts[i] || ts[0] || {}).id || null;
      try { api().reservations.create({ customerName:'Familia Hernández',    phone:'8112345678', partySize:4, date:today, time:'13:00', tableId:t(1), notes:'Cumpleaños niño' }); } catch(_){}
      try { api().reservations.create({ customerName:'José y Ana',           phone:'8118765432', partySize:2, date:today, time:'14:30', tableId:t(0) }); } catch(_){}
      try { api().reservations.create({ customerName:'Reunión Microsoft MX', phone:'8112222222', partySize:6, date:today, time:'19:00', tableId:t(3), notes:'Cliente corporativo' }); } catch(_){}
      try { api().reservations.create({ customerName:'Boda Ramírez',         phone:'8113333333', partySize:8, date:today, time:'20:30', tableId:t(4) }); } catch(_){}
      // Confirmar 2 para mostrar variedad de estados
      const all = api().reservations.list({ date: today });
      if (all[0]) api().confirm(all[0].id);
      if (all[2]) api().confirm(all[2].id);
    }
  }

  function renderKPIs(date){
    if (!api()) return;
    const rsv  = api().reservations.list({ date });
    const tables = api().tables.list();
    const confirmadas = rsv.filter(r=>r.status==='confirmed' || r.status==='seated').length;
    const pendientes  = rsv.filter(r=>r.status==='pending').length;
    const ocupacion   = tables.length ? Math.round((new Set(rsv.filter(r=>r.status!=='cancelled').map(r=>r.tableId)).size / tables.length) * 100) : 0;
    $('#kpis').innerHTML = ''
      + '<div class="kpi"><div class="lbl">Mesas configuradas</div><div class="val">'+tables.length+'</div><div class="delta">capacidad total: '+tables.reduce((a,t)=>a+(t.capacity||0),0)+' lugares</div></div>'
      + '<div class="kpi"><div class="lbl">Reservas del día</div><div class="val">'+rsv.length+'</div><div class="delta">'+pendientes+' por confirmar</div></div>'
      + '<div class="kpi"><div class="lbl">Confirmadas / sentadas</div><div class="val">'+confirmadas+'</div><div class="delta">listas para recibir</div></div>'
      + '<div class="kpi"><div class="lbl">Ocupación mesas</div><div class="val">'+ocupacion+'%</div><div class="delta">mesas con reserva hoy</div></div>';
  }

  function renderGrid(date){
    if (!api()) return;
    const tables = api().tables.list();
    const slots  = api().slots.forDate(date);
    const rsv    = api().reservations.list({ date });

    // Mapa { time: { tableId: reservation } }
    const map = {};
    rsv.forEach(r => {
      if (r.status === 'cancelled' || r.status === 'noshow') return;
      map[r.time] = map[r.time] || {};
      map[r.time][r.tableId] = r;
    });

    // Build grid: columnas = 1 (hora) + N (mesas); filas = slots
    const cols = tables.length + 1;
    const tplCols = '80px ' + tables.map(()=>'1fr').join(' ');
    let html = '<div class="grid grid-head" style="grid-template-columns:'+tplCols+';">';
    html += '<div class="cell-h">Hora</div>';
    tables.forEach(t => { html += '<div class="cell-h">'+esc(t.name)+'<div style="font-weight:400;color:#A8A29E;font-size:10px;text-transform:none;letter-spacing:0;">('+t.capacity+' pers)</div></div>'; });
    html += '</div>';

    html += '<div class="grid" style="grid-template-columns:'+tplCols+';">';
    slots.forEach(time => {
      html += '<div class="row-time">'+time+'</div>';
      tables.forEach(t => {
        const r = (map[time] && map[time][t.id]) || null;
        if (r) {
          html += '<div class="cell has" data-time="'+esc(time)+'" data-table="'+esc(t.id)+'" data-rsv="'+esc(r.id)+'">'
                +   '<span class="rsv '+esc(r.status)+'">'+esc(r.customerName)+' · '+(r.partySize||0)+'p</span>'
                + '</div>';
        } else {
          html += '<div class="cell" data-time="'+esc(time)+'" data-table="'+esc(t.id)+'"></div>';
        }
      });
    });
    html += '</div>';

    $('#grid-wrap').innerHTML = html;
    $('#cal-day-label').textContent = fmtDateLabel(date);
    $('#cal-count').textContent = rsv.length + ' reservación' + (rsv.length === 1 ? '' : 'es');
  }

  function renderUpcoming(date){
    if (!api()) return;
    const rsv = api().reservations.list({ date }).slice().sort((a,b)=>a.time.localeCompare(b.time));
    if (!rsv.length){
      $('#upcoming').innerHTML = '<li style="color:#A8A29E;text-align:center;padding:10px 0;">Sin reservaciones para este día.</li>';
      return;
    }
    $('#upcoming').innerHTML = rsv.map(r => ''
      + '<li>'
      +   '<div class="up-row">'
      +     '<span class="up-time">'+esc(r.time)+'</span>'
      +     '<span class="up-st '+esc(r.status)+'">'+esc(r.status)+'</span>'
      +   '</div>'
      +   '<div class="up-name">'+esc(r.customerName)+' · '+(r.partySize||0)+' personas</div>'
      +   '<div class="up-meta">📞 '+esc(r.phone||'sin tel')+(r.notes?' · 📝 '+esc(r.notes):'')+'</div>'
      +   '<div class="actions">'
      +     (r.status === 'pending'   ? '<button class="btn" data-rsv="'+esc(r.id)+'" data-act="confirm">✓ Confirmar</button>' : '')
      +     (r.status === 'confirmed' ? '<button class="btn" data-rsv="'+esc(r.id)+'" data-act="seat">🪑 Sentar</button>' : '')
      +     (r.status !== 'cancelled' && r.status !== 'completed' ? '<button class="btn ghost" data-rsv="'+esc(r.id)+'" data-act="cancel">✗ Cancelar</button>' : '')
      +   '</div>'
      + '</li>'
    ).join('');
  }

  function refresh(date){
    renderKPIs(date);
    renderGrid(date);
    renderUpcoming(date);
  }

  function shiftDay(delta){
    const cur = $('#d').value || todayStr();
    const [y,m,d] = cur.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    dt.setDate(dt.getDate() + delta);
    const ns = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    $('#d').value = ns;
    refresh(ns);
  }

  function toast(msg){
    const t = document.createElement('div');
    t.style.cssText='position:fixed;top:14px;right:14px;background:#1c1917;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.18);';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2400);
  }

  document.addEventListener('click', function(ev){
    const a = ev.target.closest('[data-act]');
    if (a){
      const act = a.dataset.act;
      const id  = a.dataset.rsv;
      const cur = $('#d').value || todayStr();
      try {
        if (act === 'confirm'   && id) { api().confirm(id);            refresh(cur); toast('Reserva confirmada'); return; }
        if (act === 'seat'      && id) { api().seat(id);               refresh(cur); toast('Cliente sentado');     return; }
        if (act === 'cancel'    && id) { api().cancel(id, 'manual');   refresh(cur); toast('Reserva cancelada');   return; }
      } catch(e){ toast('Error: '+e.message); return; }

      const map = {
        'nueva':    '➕ Nueva reserva · abre modal con cliente, fecha, hora, party size',
        'mesas':    '🪑 Configurar mesas · agregar/editar/quitar mesas y capacidades',
        'waitlist': '⏳ Lista de espera · ver cola y promover a reserva',
        'prev-day': null, 'next-day': null, 'today': null,
      };
      if (act === 'prev-day') return shiftDay(-1);
      if (act === 'next-day') return shiftDay(+1);
      if (act === 'today')    { $('#d').value = todayStr(); refresh(todayStr()); return; }
      if (map[act])           return toast(map[act]);
    }
    const cell = ev.target.closest('.cell:not(.has)');
    if (cell){
      toast('➕ Slot libre: '+cell.dataset.time+' · click → modal de nueva reserva');
    }
  });

  $('#d').addEventListener('change', (e) => refresh(e.target.value || todayStr()));

  // Boot
  const today = todayStr();
  $('#d').value = today;
  seedDemoIfEmpty();
  refresh(today);
})();
</script>

</body>
</html>
