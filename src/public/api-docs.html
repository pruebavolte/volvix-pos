<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Volvix POS — API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar { display: none; }
    #swagger-ui { max-width: 1400px; margin: 0 auto; }
    .header { background: #0f172a; color: #fff; padding: 14px 24px; font-family: system-ui, sans-serif; }
    .header strong { font-size: 18px; }
    .header a { color: #93c5fd; margin-left: 14px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <strong>Volvix POS · API Docs</strong>
    <a href="/api/openapi.yaml">Spec YAML</a>
    <a href="/api/health">Health</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.addEventListener('load', () => {
      window.ui = SwaggerUIBundle({
        url: '/api/openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset.slice(1)],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: 'BaseLayout',
        persistAuthorization: true,
        tryItOutEnabled: true,
        docExpansion: 'list',
        defaultModelsExpandDepth: 1
      });
    });
  </script>
</body>
</html>
