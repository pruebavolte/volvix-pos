    post: { tags: [Blobs], summary: 'Guardar blob: inventory/cash-open', requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, responses: { '200': { $ref: '#/components/responses/BlobStored' }, '401': { $ref: '#/components/responses/Unauthorized' } } }

