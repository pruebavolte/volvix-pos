  /api/docs:
    get:
      tags: [Docs]
      summary: Swagger UI (HTML) apuntando a /api/openapi.yaml
      security: []
      responses:
        '200':
          description: OK
          content:
            text/html:
              schema: { type: string }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UuidId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Petición inválida
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: No autenticado o JWT inválido
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Sin permisos para esta operación
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Recurso no encontrado
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Demasiadas peticiones
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ServerError:
      description: Error interno
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    BlobValue:
      description: Blob almacenado (último valor) o array vacío si no existe
      content: { application/json: { schema: { oneOf: [ { type: object, additionalProperties: true }, { type: array, items: { type: object, additionalProperties: true } } ] } } }
    BlobStored:
      description: Confirmación de blob guardado
      content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, key: { type: string }, stored: { type: integer, format: int64 } } } } }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    Ok:
      type: object
      properties:
        ok: { type: boolean }
    OkMessage:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    LoginResponse:
      type: object
      properties:
        ok: { type: boolean }
        token: { type: string, description: 'JWT firmado, exp 8h' }
        session:
          type: object
          properties:
            user_id: { type: string, format: uuid }
            email: { type: string, format: email }
            role: { type: string, enum: [cajero, admin, owner, superadmin, manager] }
            tenant_id: { type: string }
            tenant_name: { type: string }
            full_name: { type: string }
            company_id: { type: string, format: uuid, nullable: true }
            expires_at: { type: integer, format: int64 }
            plan: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string }
        is_active: { type: boolean }
        plan: { type: string }
        full_name: { type: string }
        phone: { type: string, nullable: true }
        company_id: { type: string, format: uuid, nullable: true }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    UserInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        role: { type: string, enum: [USER, ADMIN, OWNER, SUPERADMIN, MANAGER, CAJERO] }
        is_active: { type: boolean }
        plan: { type: string }
        full_name: { type: string }
        phone: { type: string }
        company_id: { type: string, format: uuid }
        notes: { oneOf: [ { type: string }, { type: object, additionalProperties: true } ] }

    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        owner_user_id: { type: string, format: uuid, nullable: true }
        plan: { type: string, enum: [trial, free, pro, enterprise] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    TenantInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        owner_user_id: { type: string, format: uuid }
        plan: { type: string }
        is_active: { type: boolean }

    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        category: { type: string }
        price: { type: number }
        cost: { type: number }
        stock: { type: number }
        icon: { type: string }
        tenant_id: { type: string }
    ProductInput:
      type: object
      required: [name, price]
      properties:
        code: { type: string }
        name: { type: string }
        category: { type: string }
        cost: { type: number }
        price: { type: number }
        stock: { type: number }
        icon: { type: string }
        pos_user_id: { type: string, format: uuid }

    SaleItem:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        qty: { type: number }
        price: { type: number }
        subtotal: { type: number }

    Sale:
      type: object
      properties:
        id: { type: string, format: uuid }
        pos_user_id: { type: string, format: uuid }
        total: { type: number }
        payment_method: { type: string, enum: [efectivo, tarjeta, transferencia, credito, mixto] }
        items: { type: array, items: { $ref: '#/components/schemas/SaleItem' } }
        created_at: { type: string, format: date-time }
    SaleInput:
      type: object
      required: [total]
      properties:
        total: { type: number }
        payment_method: { type: string }
        items: { type: array, items: { $ref: '#/components/schemas/SaleItem' } }
        customer:
          type: object
          properties:
            email: { type: string, format: email }
        customer_email: { type: string, format: email }

    Customer:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email, nullable: true }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        credit_limit: { type: number }
        credit_balance: { type: number }
        points: { type: integer }
        loyalty_points: { type: integer }
        active: { type: boolean }
        user_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    CustomerInput:
      type: object
      required: [name]
