openapi: 3.1.0
info:
  title: Volvix POS API
  description: |
    API serverless de Volvix POS conectada a Supabase. Multi-tenant, multi-rol (cajero, admin, owner, superadmin).
    Autenticación basada en JWT (Bearer). Todas las rutas bajo `/api/*` salvo `/api/login`, `/api/logout`,
    `/api/health`, `/api/health/deep`, `/api/errors/log`, y los endpoints de password-reset requieren `Authorization: Bearer <jwt>`.
  version: 7.3.0-r14
  contact:
    name: Volvix POS
    url: https://volvix-pos.vercel.app
  license:
    name: Proprietary
servers:
  - url: https://volvix-pos.vercel.app
    description: Producción
  - url: http://localhost:3000
    description: Desarrollo local

security:
  - BearerAuth: []

tags:
  - name: Auth
  - name: Health
  - name: Tenants
  - name: Products
  - name: Sales
  - name: Customers
  - name: Owner
  - name: Features
  - name: AI
  - name: Tickets
  - name: Inventory
  - name: InventoryAdvanced
  - name: Reports
  - name: Sync
  - name: Search
  - name: Blobs
  - name: Observability
  - name: Admin
  - name: Docs

paths:
  /api/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión y obtener JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (cliente debe descartar token)
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkMessage' }

  /api/auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Solicitar reset de contraseña (envía email con token)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: OK (siempre 200 por seguridad), content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirmar reset de contraseña con token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password, minLength: 8 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/health:
    get:
      tags: [Health]
      summary: Health check ligero
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/health/deep:
    get:
      tags: [Health]
      summary: Health check profundo (Supabase, JWT, env)
      security: []
      responses:
        '200': { description: Healthy, content: { application/json: { schema: { $ref: '#/components/schemas/HealthDeep' } } } }
        '503': { description: Degraded, content: { application/json: { schema: { $ref: '#/components/schemas/HealthDeep' } } } }

  /api/status:
    get:
      tags: [Health]
      summary: Estado de cableado (status.json)
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { description: status.json no encontrado, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/metrics:
    get:
      tags: [Observability]
      summary: Métricas runtime (admin/owner/superadmin)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Metrics' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/errors/log:
    post:
      tags: [Observability]
      summary: Registrar error de cliente (telemetría)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ErrorLogEntry' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/tenants:
    get:
      tags: [Tenants]
      summary: Listar tenants visibles
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Tenant' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      tags: [Tenants]
      summary: Crear tenant (admin/owner/superadmin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantInput' }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Tenant' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/tenants/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    patch:
      tags: [Tenants]
      summary: Actualizar tenant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TenantInput' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Tenant' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [Tenants]
      summary: Suspender tenant (soft delete)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkMessage' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/products:
    get:
      tags: [Products]
      summary: Listar productos del tenant
      parameters:
        - in: query
          name: tenant_id
          schema: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Product' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      tags: [Products]
      summary: Crear producto
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/products/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    patch:
      tags: [Products]
      summary: Actualizar producto
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ProductInput' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Product' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      tags: [Products]
      summary: Eliminar producto
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/sales:
    get:
      tags: [Sales]
      summary: Listar ventas
      parameters:
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Sale' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      tags: [Sales]
      summary: Registrar venta (envía recibo por email si customer.email)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaleInput' }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Sale' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/customers:
    get:
      tags: [Customers]
      summary: Listar clientes
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Customer' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Customers]
      summary: Crear cliente
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CustomerInput' } } }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Customer' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/customers/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    patch:
      tags: [Customers]
      summary: Actualizar cliente
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CustomerInput' } } }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Customer' } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Customers]
      summary: Soft-delete cliente
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/owner/dashboard:
    get:
      tags: [Owner]
      summary: Dashboard agregado (admin/owner/superadmin)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OwnerDashboard' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/tenants:
    get:
      tags: [Owner]
      summary: Listar todos los tenants
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Tenant' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/users:
    get:
      tags: [Owner]
      summary: Listar usuarios del sistema
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/User' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Owner]
      summary: Crear usuario (envía email de bienvenida)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UserInput' } } }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/sales-report:
    get:
      tags: [Owner]
      summary: Reporte diario consolidado
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/licenses:
    get:
      tags: [Owner]
      summary: Listar licencias
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/License' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Owner]
      summary: Crear licencia
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LicenseInput' } } }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/License' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/domains:
    get:
      tags: [Owner]
      summary: Listar dominios
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/billing:
    get:
      tags: [Owner]
      summary: Configuraciones de facturación
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/low-stock:
    get:
      tags: [Owner]
      summary: Productos con stock bajo (<20)
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Product' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/sync-queue:
    get:
      tags: [Owner]
      summary: Cola de sincronización pendiente
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/owner/settings:
    get:
      tags: [Owner]
      summary: Obtener settings del owner
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Owner]
      summary: Guardar settings del owner
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/features:
    get:
      tags: [Features]
      summary: Catálogo de features
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Feature' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/features/request:
    post:
      tags: [Features]
      summary: Solicitar feature (la IA decide activate/extend/create)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientRequest]
              properties:
                clientRequest: { type: string }
                tenantId: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/FeatureDecision' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/features/activate:
    post:
      tags: [Features]
      summary: Activar feature para un tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [featureId]
              properties:
                featureId: { type: string }
                tenantId: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/OkMessage' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/ai/decide:
    post:
      tags: [AI]
      summary: Consultar IA (decisión libre)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string }
                system: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AIResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/ai/support:
    post:
      tags: [AI]
      summary: IA de soporte técnico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AIResponse' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/ai/decisions:
    get:
      tags: [AI]
      summary: Historial de decisiones de la IA
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/tickets:
    get:
      tags: [Tickets]
      summary: Listar tickets
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Ticket' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Tickets]
      summary: Crear ticket (la IA intenta resolver)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                tenant_id: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, ticket: { $ref: '#/components/schemas/Ticket' } } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/inventory:
    get:
      tags: [Inventory]
      summary: Listado simple de productos con stock
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Product' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/inventory/adjust:
    post:
      tags: [Inventory]
      summary: Ajustar stock de un producto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, new_stock]
              properties:
                product_id: { type: string, format: uuid }
                new_stock: { type: integer }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Ok' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/inventory/locations:
    get:
      tags: [InventoryAdvanced]
      summary: Listar ubicaciones de inventario
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [warehouse, branch, transit] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/InventoryLocation' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [InventoryAdvanced]
      summary: Crear ubicación (no cajero)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/InventoryLocationInput' } } }
      responses:
        '200': { description: Created, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, result: { $ref: '#/components/schemas/InventoryLocation' } } } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/inventory/locations/{id}:
    parameters:
      - $ref: '#/components/parameters/UuidId'
    patch:
      tags: [InventoryAdvanced]
      summary: Actualizar ubicación
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/InventoryLocationInput' } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/InventoryLocation' } } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/inventory/stock:
    get:
      tags: [InventoryAdvanced]
      summary: Stock por ubicación / producto
      parameters:
        - in: query
          name: location_id
          schema: { type: string, format: uuid }
        - in: query
          name: product_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/StockRow' } } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

