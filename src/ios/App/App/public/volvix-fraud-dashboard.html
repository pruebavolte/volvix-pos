<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Volvix · Fraud Review</title>
<link rel="stylesheet" href="volvix-modals.css">
<script defer src="volvix-modals.js"></script>
<style>
  :root { --bg:#0f1115; --card:#181b22; --fg:#e7e9ee; --mut:#8a93a4;
          --warn:#f59e0b; --bad:#ef4444; --ok:#22c55e; --br:#262a33; }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--fg);
    font:14px/1.4 system-ui,Segoe UI,Roboto,sans-serif}
  header{padding:16px 22px;border-bottom:1px solid var(--br);
    display:flex;justify-content:space-between;align-items:center}
  h1{margin:0;font-size:18px} .pill{padding:2px 8px;border-radius:99px;
    background:#262a33;font-size:11px}
  main{padding:22px}
  table{width:100%;border-collapse:collapse;background:var(--card);
    border-radius:8px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--br);
    font-size:13px}
  th{background:#1f232c;color:var(--mut);font-weight:600;text-transform:uppercase;
    font-size:11px;letter-spacing:.5px}
  tr:hover td{background:#1c1f27}
  .score{font-weight:700} .s-hi{color:var(--bad)} .s-md{color:var(--warn)}
  button{padding:6px 12px;border:0;border-radius:6px;cursor:pointer;
    font-size:12px;font-weight:600;margin-right:6px}
  .btn-ok{background:var(--ok);color:#062013}
  .btn-bad{background:var(--bad);color:#2a0606}
  .empty{text-align:center;padding:40px;color:var(--mut)}
  .err{color:var(--bad);padding:10px;background:#2a1414;border-radius:6px;margin:10px 0}
  details{background:#13161c;padding:6px 10px;border-radius:6px}
  details summary{cursor:pointer;color:var(--mut)}
  pre{white-space:pre-wrap;word-break:break-word;font-size:11px;color:var(--mut)}
</style>
</head>
<body>
<header>
  <h1>Fraud Review <span class="pill" id="cnt">0</span></h1>
  <div>
    <select id="status">
      <option value="pending">Pendientes</option>
      <option value="approved">Aprobadas</option>
      <option value="rejected">Rechazadas</option>
    </select>
    <button onclick="load()">Refrescar</button>
  </div>
</header>
<main>
  <div id="err" class="err" style="display:none"></div>
  <table>
    <thead><tr>
      <th>Score</th><th>Sale ID</th><th>Customer</th>
      <th>Reglas</th><th>Creada</th><th>Acciones</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">Sin alertas.</div>
</main>
<script>
const API = (window.API_BASE || '') + '/api/fraud';
// R28: usar la key estándar del sistema; redirigir a login si 401
function token() {
  return localStorage.getItem('volvix_token')
      || localStorage.getItem('volvixAuthToken')
      || localStorage.getItem('volvix_jwt')
      || '';
}
function gotoLogin() {
  const back = encodeURIComponent(location.pathname + location.search);
  location.replace('/login.html?expired=1&redirect=' + back);
}
async function call(path, opts) {
  opts = opts || {};
  const tk = token();
  if (!tk) { gotoLogin(); throw new Error('sin sesión'); }
  opts.headers = Object.assign({
    'Content-Type':'application/json',
    'Authorization':'Bearer ' + tk
  }, opts.headers || {});
  const r = await fetch(API + path, opts);
  if (r.status === 401 || r.status === 403) { gotoLogin(); throw new Error('sin permisos'); }
  if (!r.ok) {
    const txt = r.status >= 500 ? 'Servicio temporalmente no disponible' : 'No se pudieron cargar las alertas';
    throw new Error(txt + ' (' + r.status + ')');
  }
  return r.json();
}
function fmtScore(s) {
  const cls = s >= 85 ? 's-hi' : 's-md';
  return '<span class="score ' + cls + '">' + s + '</span>';
}
function fmtRules(rs) {
  if (!Array.isArray(rs) || !rs.length) return '<em>—</em>';
  return rs.map(r => '<span class="pill">' + (r.name||r.id) + '</span>').join(' ');
}
async function review(saleId, action) {
  let ok=false;
  const isApprove = action === 'approve';
  if(window.VolvixUI && typeof window.VolvixUI.confirm==='function'){
    ok = await window.VolvixUI.confirm({
      title: (isApprove?'Aprobar':'Rechazar')+' venta',
      message: 'Confirmar ' + action.toUpperCase() + ' de la venta ' + saleId + '?',
      danger: !isApprove,
      confirmText: isApprove?'Aprobar':'Rechazar'
    });
  } else { ok = confirm('Confirmar ' + action.toUpperCase() + ' de la venta ' + saleId + '?'); }
  if (!ok) return;
  try {
    await call('/review/' + saleId, {
      method:'POST', body: JSON.stringify({ action })
    });
    load();
  } catch (e) { showErr(e.message); }
}
function showErr(m) {
  const el = document.getElementById('err');
  el.textContent = m; el.style.display = 'block';
}
async function load() {
  document.getElementById('err').style.display = 'none';
  const status = document.getElementById('status').value;
  try {
    const rows = await call('/alerts?status=' + status);
    document.getElementById('cnt').textContent = rows.length;
    const tbody = document.getElementById('rows');
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = rows.length ? 'none' : 'block';
    for (const a of rows) {
      const tr = document.createElement('tr');
      const created = new Date(a.created_at).toLocaleString();
      tr.innerHTML =
        '<td>' + fmtScore(a.score) + '</td>' +
        '<td><code>' + (a.sale_id||'').slice(0,8) + '</code></td>' +
        '<td>' + (a.customer_id ? '<code>'+a.customer_id.slice(0,8)+'</code>' : '<em>guest</em>') + '</td>' +
        '<td>' + fmtRules(a.triggered_rules) + '</td>' +
        '<td>' + created + '</td>' +
        '<td>' + (status==='pending' ?
          '<button class="btn-ok" data-id="'+a.sale_id+'" data-act="approve">Aprobar</button>' +
          '<button class="btn-bad" data-id="'+a.sale_id+'" data-act="reject">Rechazar</button>'
          : '<em>'+a.status+'</em>') +
        '</td>';
      tbody.appendChild(tr);
    }
    tbody.querySelectorAll('button[data-id]').forEach(b => {
      b.onclick = () => review(b.dataset.id, b.dataset.act);
    });
  } catch (e) { showErr(e.message); }
}
document.getElementById('status').addEventListener('change', load);
load();
setInterval(load, 30000);
</script>
</body>
</html>
