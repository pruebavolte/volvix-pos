<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volvix POS · Welcome Wizard</title>
<meta name="description" content="Wizard de bienvenida de Volvix POS. Te lleva al setup inicial de tu cuenta en cinco pasos.">
<meta name="robots" content="noindex,nofollow">
<!-- B44: 301-style redirect via meta refresh + JS fallback. SEO preserved
     because <title> + <meta description> remain on the wrapper. -->
<meta http-equiv="refresh" content="0; url=/volvix-onboarding-v2.html">
<link rel="canonical" href="/volvix-onboarding-v2.html">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
  body{min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;padding:20px;color:#fff;text-align:center}
  .card{background:rgba(255,255,255,.1);padding:32px 36px;border-radius:14px;backdrop-filter:blur(8px);max-width:420px}
  .card h1{font-size:22px;margin-bottom:8px}
  .card p{opacity:.85;font-size:14px;margin-bottom:18px}
  .spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;margin:0 auto 16px;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#fff;text-decoration:underline;font-size:13px}
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Bienvenido a Volvix POS</h1>
    <p>Redirigiendo al wizard de configuración...</p>
    <a href="/volvix-onboarding-v2.html">Ir manualmente al wizard</a>
  </div>
<script>
  // JS fallback: si el meta refresh falla (raro), forzar redirect inmediato.
  // Mantiene la query string para preservar parámetros de tracking/onboarding.
  (function () {
    var qs = window.location.search || '';
    window.location.replace('/volvix-onboarding-v2.html' + qs);
  })();
</script>
</body>
</html>
