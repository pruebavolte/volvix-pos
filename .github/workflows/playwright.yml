name: Playwright E2E

on:
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npm install -D @playwright/test

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Check target URL
        id: check_url
        env:
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "PREVIEW_URL secret not configured — E2E tests require a live URL"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "BASE_URL=$PREVIEW_URL" >> $GITHUB_ENV
          fi

      - name: Run Playwright tests
        if: steps.check_url.outputs.skip == 'false'
        env:
          BASE_URL: ${{ secrets.PREVIEW_URL }}
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
        run: npx playwright test --project=chromium

      - name: Skip notice (no PREVIEW_URL)
        if: steps.check_url.outputs.skip == 'true'
        run: echo "E2E skipped — configure PREVIEW_URL secret to enable against Vercel preview"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots & traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            screenshots/
          retention-days: 14
          if-no-files-found: ignore
