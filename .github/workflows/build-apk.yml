name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'public/**'
      - 'capacitor.config.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Generate debug keystore (autosign)
        run: |
          cd android/app
          if [ ! -f volvix-release.keystore ]; then
            keytool -genkeypair -v \
              -keystore volvix-release.keystore \
              -alias volvix-pos \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass volvix2026 -keypass volvix2026 \
              -dname "CN=Volvix POS, OU=Volvix, O=Volvix, L=Monterrey, ST=NL, C=MX"
          fi

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PVOLVIX_KEYSTORE_PASSWORD=volvix2026 \
            -PVOLVIX_KEY_ALIAS=volvix-pos \
            -PVOLVIX_KEY_PASSWORD=volvix2026

      - name: Locate APK
        id: locate
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" | head -1)
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Rename APK
        run: cp "${{ steps.locate.outputs.apk_path }}" VolvixPOS.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolvixPOS-apk
          path: VolvixPOS.apk
          retention-days: 90

      - name: Attach to latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Borrar asset existente si ya existe (idempotente)
          gh release delete-asset v1.0.157 VolvixPOS.apk --yes || true
          gh release upload v1.0.157 VolvixPOS.apk --clobber || \
            gh release create v1.0.157 VolvixPOS.apk \
              --title "Volvix POS v1.0.157" \
              --notes "APK Android auto-construido por GitHub Actions"
