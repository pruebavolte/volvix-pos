name: Week 1 Final Report

on:
  schedule:
    # 19 mayo 2026, 15:00 UTC = 09:00 Monterrey (UTC-6).
    # Cron normal corre cada año en esa fecha — el script verifica fecha exacta.
    - cron: '0 15 19 5 *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Generate WEEK1_FINAL_REPORT.md
        id: gen
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node monitoring/week1_report.js > monitoring/WEEK1_FINAL_REPORT.md
          VERDICT=$(grep -oE 'VERDICT: (STABLE|REGRESSION|DEGRADING)' monitoring/WEEK1_FINAL_REPORT.md | head -1 | sed 's/VERDICT: //')
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitoring/WEEK1_FINAL_REPORT.md
          git commit -m "auto: WEEK1_FINAL_REPORT verdict=${{ steps.gen.outputs.verdict }}" || echo "no changes"
          git push

      - name: Open issue if regression/degrading
        if: steps.gen.outputs.verdict == 'REGRESSION' || steps.gen.outputs.verdict == 'DEGRADING'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Week1 Monitoring: ${{ steps.gen.outputs.verdict }}" \
            --label "priority:p0" \
            --body "Auto-generated by week1-report workflow. See monitoring/WEEK1_FINAL_REPORT.md"
