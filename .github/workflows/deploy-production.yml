name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 2026-05: permitir disparo manual desde GitHub UI

jobs:
  deploy:
    name: Trigger Vercel Production Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 2026-05: continue-on-error en checks no-bloqueantes — antes un syntax
      # error tonto en cualquier api/*.js bloqueaba el deploy entero, dejando
      # producción atorada en commits viejos. Ahora warning pero NO bloquea.
      - name: Syntax check api/index.js (warning only)
        continue-on-error: true
        run: node --check api/index.js && echo "✓ syntax OK" || echo "⚠ syntax warning (deploy continuará)"

      # 2026-05: el deploy hook SIEMPRE corre (no depende del check anterior)
      - name: Trigger Vercel production deploy
        id: deploy
        run: |
          set -eu
          RESPONSE=$(curl -sS -X POST "https://api.vercel.com/v1/integrations/deploy/prj_2f9m0VwArnqlGvlBZtxchvQl1a2t/AZu9c0G1Ie" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}')
          echo "Deploy hook response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('job',{}).get('id','?'))" 2>/dev/null || echo "?")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "✓ Deploy job: $JOB_ID"

      # 2026-05: dominio canónico ahora es systeminternational.app (no salvadorexoficial.com)
      - name: Wait for deployment and verify
        continue-on-error: true
        run: |
          echo "Waiting 60s for deployment to propagate..."
          sleep 60
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://systeminternational.app/api/health")
            echo "Health check attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✓ Production verified"
              exit 0
            fi
            sleep 30
          done
          echo "⚠ Health check no respondió 200 tras 5 intentos — revisar manualmente"
